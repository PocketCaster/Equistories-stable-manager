<!DOCTYPE html>
<html lang="en">

<body>
<div id="app"></div>
<style>
  html, body { background:#1b1410; margin:0; padding:0; }
  #app {
    --bg:#1b1410; --panel:#241a14; --panel2:#2c2118;
    --accent:#c98a3a; --accent2:#7a9b6e;
    --text:#f1e6d8; --dim:#b5a392; --danger:#b1473f; --warn:#c9a23a; --good:#7a9b6e;
    font-family:'Georgia','Garamond',serif; color:var(--text);
    background:var(--bg); padding:18px; max-width:960px; margin:0 auto;
  }
  #app h1,#app h2,#app h3 { font-family:'Palatino Linotype',Georgia,serif; margin:.2em 0; }
  #app h1 { color:var(--accent); border-bottom:2px solid var(--accent); padding-bottom:6px; font-size:1.5em; }
  #app h3 { color:var(--accent); font-size:1.1em; margin-bottom:8px; }
  #app .card { background:var(--panel); border:1px solid #4a392a; border-radius:8px; padding:16px; margin-bottom:14px; }
  #app .tabs { display:flex; gap:6px; margin:12px 0 16px; flex-wrap:wrap; }
  #app .tab { padding:7px 16px; background:var(--panel2); border:1px solid #4a392a; border-radius:6px 6px 0 0; cursor:pointer; color:var(--dim); font-size:.92em; }
  #app .tab.active { background:var(--accent); color:#241a14; font-weight:bold; border-color:var(--accent); }
  #app .row { display:flex; gap:10px; flex-wrap:wrap; }
  #app .row > div { flex:1; min-width:140px; }
  #app label { font-size:.78em; color:var(--dim); display:block; margin-bottom:3px; text-transform:uppercase; letter-spacing:.5px; }
  #app input, #app select, #app textarea {
    width:100%; padding:7px 9px; background:#15100c; border:1px solid #4a392a;
    color:var(--text); border-radius:5px; font-family:inherit; font-size:.95em; box-sizing:border-box;
  }
  #app button {
    background:var(--accent); color:#231a12; border:none; padding:9px 16px;
    border-radius:6px; cursor:pointer; font-weight:bold; font-family:inherit; font-size:.9em; margin-top:6px;
  }
  #app button.secondary { background:var(--panel2); color:var(--text) !important; border:1px solid var(--accent); }
  #app button.danger { background:var(--danger); color:#fff !important; }
  #app button:hover { opacity:.88; }
  #app .small { font-size:.8em; color:var(--dim); }
  #app .tag { display:inline-block; font-size:.72em; padding:2px 8px; border-radius:10px; margin-left:4px; background:#15100c; color:var(--dim); border:1px solid #4a392a; }
  #app .result { padding:10px; border-radius:6px; margin-top:8px; font-weight:bold; }
  #app .result.success { background:rgba(122,155,110,.15); border:1px solid var(--good); color:var(--good); }
  #app .result.fail { background:rgba(177,71,63,.15); border:1px solid var(--danger); color:var(--danger); }
  #app .pill-select { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  #app .pill { padding:5px 11px; background:#15100c; border:1px solid #4a392a; border-radius:14px; font-size:.82em; cursor:pointer; color:var(--dim); }
  #app .pill.active { background:var(--accent); color:#241a14; border-color:var(--accent); }
  #app .prompt-box { background:#15100c; border:1px dashed var(--accent); border-radius:6px; padding:10px; margin-top:8px; font-style:italic; color:var(--text); font-size:.9em; }
  /* Horse cards */
  #app .horse-card { background:var(--panel2); border:1px solid #4a392a; border-radius:8px; padding:12px; margin-bottom:10px; }
  #app .horse-photo { width:64px; height:64px; border-radius:8px; object-fit:cover; border:2px solid var(--accent); }
  #app .horse-photo-placeholder { width:64px; height:64px; border-radius:8px; border:2px solid #4a392a; display:flex; align-items:center; justify-content:center; font-size:1.8em; background:#15100c; }
  /* Lightbox */
  #lightbox-overlay { position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:99999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;padding:20px; }
  #lightbox-overlay img { max-width:100%;max-height:90vh;border-radius:8px;box-shadow:0 0 40px rgba(0,0,0,.8);object-fit:contain; }
  #lightbox-overlay .lb-caption { position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#f1e6d8;background:rgba(0,0,0,.7);padding:6px 16px;border-radius:20px;font-size:.85em; }
  /* Art log */
  #app .artlog-panel { margin-top:10px; background:#15100c; border:1px solid #4a392a; border-radius:6px; padding:8px; max-height:280px; overflow-y:auto; }
  #app .artlog-entry { padding:7px 0; border-bottom:1px dashed #2c2118; font-size:.85em; }
  #app .artlog-entry:last-child { border-bottom:none; }
  #app .artlog-thumb { width:48px; height:48px; border-radius:5px; object-fit:cover; border:1px solid #4a392a; margin-right:8px; vertical-align:middle; }
  /* Stat bars */
  #app .statgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; margin-top:8px; font-size:.82em; }
  #app .statbar-wrap { display:flex; align-items:center; gap:5px; }
  #app .statbar-bg { flex:1; height:6px; background:#15100c; border-radius:4px; overflow:hidden; }
  #app .statbar-fill { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); }
  #app .expbar-bg { height:8px; background:#15100c; border-radius:5px; overflow:hidden; margin-top:4px; }
  #app .expbar-fill { height:100%; background:linear-gradient(90deg,#8a6fb0,#c98a3a); }
  #app .breedslots { display:flex; gap:5px; margin-top:5px; flex-wrap:wrap; }
  #app .slot { width:20px; height:20px; border-radius:50%; border:1px solid var(--accent); display:flex; align-items:center; justify-content:center; font-size:.65em; }
  #app .slot.filled { background:var(--accent); color:#15100c; }
  /* Required field indicator */
  #app .required { color:var(--warn); font-size:.8em; margin-left:4px; }
  #app input.missing, #app select.missing { border-color:var(--danger) !important; }
</style>
<script>
(function(){

// ============================================
// CONSTANTS
// ============================================

const STATS = ["stamina","strength","scope","speed","handiness","boldness","balance","gaits","harmony"];
const STAT_LABELS = {stamina:"Stamina",strength:"Strength",scope:"Scope",speed:"Speed",handiness:"Handiness",boldness:"Boldness",balance:"Balance",gaits:"Gaits",harmony:"Harmony"};

const LEVEL_TABLE = {
  1:{exp:0,bonus:0,slots:2}, 2:{exp:50,bonus:2,slots:1}, 3:{exp:100,bonus:2,slots:1},
  4:{exp:150,bonus:3,slots:1}, 5:{exp:200,bonus:3,slots:1}, 6:{exp:250,bonus:3,slots:1},
  7:{exp:300,bonus:4,slots:1}, 8:{exp:500,bonus:4,slots:1}, 9:{exp:750,bonus:4,slots:1},
  10:{exp:1000,bonus:5,slots:2},

const ART_EXP = {
  "Uncolored Headshot":1, "Colored Headshot":2,
  "Uncolored Fullbody":3, "Colored Fullbody":4,
};

const BONUS_EXP = {
  "Background":3, "Shading":3, "Rider/Handler shown":4, "Additional Creature (per)":2,
};

const TRAININGS = [
  {id:"lunge",       name:"Lunging / Groundwork",     stats:{gaits:4,stamina:4,balance:4},   prompt:"Show your horse working on the lunge — rhythm, relaxation, and forward movement. Handler must be visible."},
  {id:"desensitize", name:"Object Desensitization",   stats:{boldness:3,harmony:3},           prompt:"Show your horse calmly facing something new and a little spooky — a tarp, a strange jump, an unfamiliar corner."},
  {id:"flatwork",    name:"Flatwork",                  stats:{gaits:3,balance:3,handiness:3}, prompt:"Show your horse working on the flat — transitions, lateral work, or a polished school movement. Rider must be shown."},
  {id:"polework",    name:"Pole Work",                 stats:{balance:4,gaits:3,scope:2},     prompt:"Show your horse navigating ground poles or cavaletti — clean feet, focused eyes."},
  {id:"jumping",     name:"Jump Schooling",            stats:{scope:4,boldness:3,balance:3},  prompt:"Show your horse jumping a single fence or small course in a schooling context."},
  {id:"xc",          name:"XC School",                 stats:{boldness:4,scope:4,stamina:4},  prompt:"Show your horse tackling a cross-country style fence or water complex out in open terrain."},
  {id:"water",       name:"Water Complex",             stats:{boldness:5,stamina:3},           prompt:"Depict your horse entering, splashing through, or exiting a water jump."},

  {id:"trail",       name:"Trail Ride",                stats:{boldness:2,harmony:3,stamina:2},prompt:"Depict your horse and rider out on a relaxed trail — through forest, along a beach, across open fields."},
  {id:"liberty",     name:"Liberty Work",              stats:{harmony:5,boldness:2},           prompt:"Depict your horse working completely at liberty with no tack."},
  {id:"bareback",    name:"Bareback Riding",           stats:{balance:4,harmony:3},            prompt:"Depict rider and horse working without a saddle — any gait or activity."},
  {id:"slope",       name:"Working on a Slope",        stats:{strength:4,stamina:3,balance:3},prompt:"Show your horse working up or down a hill — could be hacking, schooling, or conditioning work."},
  {id:"swim",        name:"Swimming / Water Work",     stats:{stamina:5,strength:3,boldness:2},prompt:"Show your horse swimming in open water or walking through a deep creek or river."},
  {id:"horsemanship",name:"Natural Horsemanship",      stats:{harmony:4,boldness:3},           prompt:"Show a join-up, leading without a halter, or pressure-and-release groundwork."},
  {id:"bonding",     name:"Bonding / Quiet Time",      stats:{harmony:4},                      prompt:"Show a quiet moment between horse and handler — grooming, grazing together, hand-grazing, or just being present."},
  {id:"equibreak",   name:"Equibreak",                 stats:{harmony:3},                      prompt:"Depict a breaking milestone — first halter, first tack, first rider, or first solo work under saddle.", foalOnly:true},
  {id:"show_prep",   name:"Show Prep / Grooming",      stats:{harmony:2},                      prompt:"Show your horse being bathed, braided, or otherwise prepared for a show."},
  {id:"vet_farrier", name:"Vet / Farrier Visit",       stats:{harmony:2,boldness:2},           prompt:"Show your horse during a vet exam, farrier appointment, or dental float."},
  {id:"pasture",     name:"Pasture / Herd Time",       stats:{harmony:3,boldness:2},           prompt:"Depict your horse loose in a field — with herd mates, playing, or grazing at peace."},
  {id:"stretching",  name:"Stretching / Cool Down",    stats:{balance:2,harmony:2,stamina:2}, prompt:"Depict a post-workout stretch — carrot stretches or cooling down at a slow walk."},
  {id:"jumpcourse",  name:"Stadium Jumping Course",    stats:{scope:4,handiness:4,balance:3}, prompt:"Depict your horse jumping a full stadium course — colored poles, combinations, oxers."},
  {id:"hack_canter", name:"Forward Canter Hack",       stats:{speed:3,stamina:3,boldness:2},  prompt:"Show your horse in a big forward canter across open ground — covering ground freely."},

const DISCIPLINES = {
  "Show Jumping":    {stats:["scope","balance","handiness"],      difficulties:["Intro","Beginner Novice","Novice","Training","Preliminary","Intermediate","Advanced"]},
  "Dressage":        {stats:["gaits","harmony","balance"],         difficulties:["Intro","Training","First","Second","Third","Fourth","Prix St. Georges","Grand Prix"]},
  "Eventing":        {stats:["scope","stamina","boldness"],        difficulties:["Intro","Beginner Novice","Novice","Training","Preliminary","Intermediate","Advanced"]},
  "Hunter":          {stats:["gaits","scope","harmony"],           difficulties:["Short Stirrup","Beginner","Elementary","Medium","Working","Amateur","Open"]},
  "Western Pleasure":{stats:["gaits","harmony","balance"],         difficulties:["Walk-Trot","Novice","Amateur","Open","Select"]},
  "Reining":         {stats:["handiness","balance","harmony"],     difficulties:["Novice","Level 1","Level 2","Level 3","Level 4"]},
  "Endurance":       {stats:["stamina","boldness","strength"],     difficulties:["LD 25mi","50mi","75mi","100mi"]},
  "Barrel Racing":   {stats:["speed","handiness","boldness"],      difficulties:["Amateur","Open","Youth","Pro"]},
  "Trail Class":     {stats:["harmony","handiness","boldness"],    difficulties:["Novice","Amateur","Open"]},
};

function calcLitExp(wc){
  if(!wc || wc < 200) return 0;
  return 2 + Math.floor((wc-200)/500)*2;
}

// ============================================
// STATE
// ============================================

const BANK_URL = 'https://script.google.com/macros/s/AKfycby9WLxUPDAPg9EH5aTPATzTkHd8XeSKXuQ0WYqyQoHusEbws85qxwaML6cSovDod80/exec';
let STABLE_URL = localStorage.getItem('equi_stable_url') || '';

let state = { horses:[], log:[], tackInventory:[], loaded:false };
let bankAccount = { userId:'', password:'', linked:false };
let activeTab = "roster";
let expandedLogs = new Set();

function uid(){ return 'h_'+Math.random().toString(36).slice(2,9); }
function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function el(tag,cls,html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; }
function addLog(msg){ state.log.unshift({day:Date.now(),msg}); if(state.log.length>200)state.log.pop(); }

function openLightbox(src, caption){
  document.getElementById('lightbox-overlay')?.remove();
  const lb = document.createElement('div');
  lb.id = 'lightbox-overlay';
  lb.innerHTML = `<div style="position:relative;text-align:center;">
    <img src="${src}" />
    ${caption?`<div class="lb-caption">${caption}</div>`:''}
    <div style="position:fixed;top:16px;right:20px;font-size:1.8em;cursor:pointer;color:#f1e6d8;line-height:1;" id="lb-close">✕</div>
  </div>`;
  lb.onclick = ()=>lb.remove();
  document.body.appendChild(lb);
}

// ============================================
// GOOGLE SHEETS BACKEND
// ============================================

// JSONP transport — same approach as full sim to bypass CORS
function stableGas(payload){
  return new Promise(resolve=>{
    if(!STABLE_URL){ resolve({success:false,error:'No Stable Data URL configured.'}); return; }
    const cb='sCb_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    const url=STABLE_URL+'?callback='+cb+'&data='+encodeURIComponent(JSON.stringify(payload));
    const s=document.createElement('script');
    let done=false;
    window[cb]=(data)=>{ done=true; delete window[cb]; try{document.head.removeChild(s);}catch(e){} resolve(data); };
    s.onerror=()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} resolve({success:false,error:'Network error'});} };
    setTimeout(()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} resolve({success:false,error:'Timed out'});} },15000);
    s.src=url; document.head.appendChild(s);
  });
}

function gasPost(payload){
  return new Promise(resolve=>{
    const cb='gCb_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    const url=BANK_URL+'?callback='+cb+'&data='+encodeURIComponent(JSON.stringify(payload));
    const s=document.createElement('script');
    let done=false;
    window[cb]=(data)=>{ done=true; delete window[cb]; try{document.head.removeChild(s);}catch(e){} resolve(data); };
    s.onerror=()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} resolve({success:false,error:'Network error'});} };
    setTimeout(()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} resolve({success:false,error:'Timed out'});} },12000);
    s.src=url; document.head.appendChild(s);
  });
}

function gasGet(params){
  return new Promise(resolve=>{
    const cb='ggCb_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    const qs=Object.entries(params).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    const url=BANK_URL+'?'+qs+'&callback='+cb;
    const s=document.createElement('script');
    let done=false;
    window[cb]=(data)=>{ done=true; delete window[cb]; try{document.head.removeChild(s);}catch(e){} resolve(data); };
    s.onerror=()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} resolve(null);} };
    setTimeout(()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} resolve(null);} },12000);
    s.src=url; document.head.appendChild(s);
  });
}

function saveBankAccount(){
  try{ localStorage.setItem('equi-lite-bank', JSON.stringify(bankAccount)); }catch(e){}
}

// Save full stable to Google Sheets
async function save(){
  if(!bankAccount.linked || !STABLE_URL) return;
  const userId = bankAccount.userId;
  await stableGas({ action:'saveStableState', userId,
    stateJson: JSON.stringify({ log:state.log, tackInventory:state.tackInventory }) });
  for(const h of state.horses){
    const {artLog,...horseData}=h;
    await stableGas({ action:'saveHorse', userId, horseId:h.id, horseJson:JSON.stringify(horseData) });
  }
}

// Save a single horse (faster — called after training/comp)
async function saveHorse(horse){
  if(!bankAccount.linked || !STABLE_URL) return;
  const {artLog,...horseData}=horse;
  await stableGas({ action:'saveHorse', userId:bankAccount.userId, horseId:horse.id, horseJson:JSON.stringify(horseData) });
}

// Save a new art log entry
async function saveArtEntry(horse, entry){
  if(!bankAccount.linked || !STABLE_URL) return;
  await stableGas({ action:'saveArtLogEntry', userId:bankAccount.userId, horseId:horse.id, entryJson:JSON.stringify(entry) });
}

// Delete a horse from sheets
async function deleteHorseFromSheets(horseId){
  if(!bankAccount.linked || !STABLE_URL) return;
  await stableGas({ action:'deleteHorse', userId:bankAccount.userId, horseId });
}

async function loadFromSheets(){
  const userId = bankAccount.userId;
  const stateRes = await stableGas({ action:'loadStableState', userId });
  if(stateRes?.success && stateRes.data){
    state.log           = stateRes.data.log || [];
    state.tackInventory = stateRes.data.tackInventory || [];
  } else {
    state.log=[]; state.tackInventory=[];
  }
  const horsesRes = await stableGas({ action:'loadStable', userId });
  state.horses = horsesRes?.success ? (horsesRes.data||[]) : [];
  state.loaded = true;
}

// Load a single horse by ID without login (for public profile pages)
async function loadPublicHorse(horseId){
  const res = await stableGas({ action:'loadPublicHorse', horseId });
  return res?.success ? res.data : null;
}

async function load(){
  // Load bank credentials
  try{
    const b=localStorage.getItem('equi-lite-bank');
    if(b){ const bd=JSON.parse(b); bankAccount={userId:bd.userId||'',password:bd.password||'',linked:bd.linked||false}; }
  }catch(e){}

  // Check for public horse profile URL first — no login needed
  const params=new URLSearchParams(window.location.search);
  const profileId=params.get('horse');
  if(profileId){
    // Try to serve profile without login
    state.loaded=true;
    render();
    return;
  }

  if(bankAccount.linked && STABLE_URL){
    await loadFromSheets();
  } else {
    state.horses=[]; state.log=[]; state.tackInventory=[];
    state.loaded=true;
  }
  render();
}

// ============================================
// HORSE
// ============================================

function newHorse(data){
  const stats={};
  STATS.forEach(s=>stats[s]=10);
  const age = Number(data.age)||3;
  return {
    id:uid(), name:data.name, breed:data.breed||"Unspecified", age,
    stage: age<1?"foal":age<2?"yearling":age<3?"two-year-old":"adult",
    level:1, exp:0, stats,
    breedingSlots:2, breedingFilled:0,
    profileImage:null, referenceImage:null, referenceLink:null,
    artLog:[],
    gender:data.gender||"", phenotype:data.phenotype||"", genotype:data.genotype||"",
    // Pedigree — 3 generations. Each ancestor: {name, link, inRosterId}
    // Slot keys: sire, dam, ss, sd, ds, dd, sss, ssd, sds, sdd, dss, dsd, dds, ddd
    pedigree: data.pedigree || {},
    // Keep legacy fields for backwards compat
    sireId:null, sireName:"", sireOwner:"", damId:null, damName:"", damOwner:"",
    tackOwned:[],       // [{id,name,image,stats:{stat:val},category}]
    tackEquipped:[],    // array of tackOwned ids currently equipped
    breedingRecords:[], // [{id, slotIndex, partnerName, partnerOwner, role:"sire"|"dam", date, foalId, foalName, note}]
    compHistory:[],     // [{id, date, discipline, difficulty, placement, venue, note, image}]
    // Profile page public fields
    ownerName: data.ownerName||"",
    ownerLink: data.ownerLink||"",
    riderName: data.riderName||"",
    stableName: data.stableName||"",
    stableLink: data.stableLink||"",
    personality: data.personality||"",
    horseHistory: data.horseHistory||"",
    // Net worth (Lightblood pricing)
    genoBasePrice: data.genoBasePrice||0,
    genoModifiers: data.genoModifiers||[],  // [{label, value}]
    customNetWorth: data.customNetWorth||null, // override if set manually
  };
}

function uid2(){ return 't_'+Math.random().toString(36).slice(2,9); }

function getEquippedStatBonus(h, stat){
  let bonus=0;
  (h.tackEquipped||[]).forEach(tid=>{
    const item=(h.tackOwned||[]).find(t=>t.id===tid);
    if(item && item.stats && item.stats[stat]) bonus += Number(item.stats[stat])||0;
  });
  return bonus;
}

function getEffectiveStat(h, stat){
  return (h.stats[stat]||0) + getEquippedStatBonus(h, stat);
}

function checkLevelUp(h){
  while(h.level<10 && h.exp>=LEVEL_TABLE[h.level+1].exp){
    h.level++;
    const t=LEVEL_TABLE[h.level];
    STATS.forEach(s=>h.stats[s]+=t.bonus);
    h.breedingSlots+=t.slots;
    addLog(`🎉 ${h.name} reached Level ${h.level}! +${t.bonus} to all stats.`);
  }
}

// ============================================
// RENDER
// ============================================

function render(){
  const app = document.getElementById('app');
  if(!state.loaded){ app.innerHTML='<div style="padding:30px;color:#b5a392;">Loading…</div>'; return; }

  // Check for horse profile URL (?horse=ID) — public, no login needed
  const params = new URLSearchParams(window.location.search);
  const profileId = params.get('horse');
  if(profileId){
    // First check if horse is in local state
    const localHorse = state.horses.find(x=>x.id===profileId);
    if(localHorse){ renderHorseProfilePage(app, localHorse); return; }
    // Otherwise load from sheets publicly
    app.innerHTML='<div style="padding:40px;text-align:center;color:#b5a392;font-family:Georgia,serif;">🐴 Loading horse profile…</div>';
    loadPublicHorse(profileId).then(h=>{
      if(h){ renderHorseProfilePage(app, h); }
      else { app.innerHTML='<div style="padding:40px;text-align:center;color:#b5a392;font-family:Georgia,serif;">Horse not found. <a href="'+window.location.pathname+'" style="color:#c98a3a;">← Back</a></div>'; }
    });
    return;
  }

  // Show login screen if not linked
  if(!bankAccount.linked){
    renderLoginScreen(app);
    return;
  }

  app.innerHTML=`
    <h1>🐴 EquiStories Art Tracker</h1>
    <div class="tabs" style="align-items:center;">
      ${["roster","train","compete","tack"].map(t=>`
        <div class="tab${activeTab===t?' active':''}" data-tab="${t}">
          ${t==="roster"?"Stable Roster":t==="train"?"Training":t==="compete"?"Competitions":"🏇 Tack Inventory"}
        </div>`).join("")}
      <div style="flex:1;"></div>
      <span class="small" style="color:var(--dim);margin-right:6px;">👤 ${bankAccount.userId}</span>
      <button id="btn_signout" class="secondary" style="font-size:.78em;padding:4px 10px;margin-top:0;">🔓 Sign Out</button>
    </div>
    <div id="tab-content"></div>
  `;

  app.querySelectorAll('[data-tab]').forEach(b=>{
    b.onclick=()=>{ activeTab=b.dataset.tab; render(); };
  });
  const signOutBtn=app.querySelector('#btn_signout');
  if(signOutBtn) signOutBtn.onclick=async()=>{
    if(!confirm('Sign out? Your stable data is saved to Google Sheets — sign back in anytime.')) return;
    bankAccount={userId:'',password:'',linked:false};
    state.horses=[]; state.log=[]; state.tackInventory=[]; state.loaded=false;
    saveBankAccount();
    load();
  };

  const content = app.querySelector('#tab-content');
  if(activeTab==="roster")   content.appendChild(renderRoster());
  else if(activeTab==="train")   content.appendChild(renderTraining());
  else if(activeTab==="compete") content.appendChild(renderCompete());
  else if(activeTab==="tack")    content.appendChild(renderTackInventory());
}

function renderLoginScreen(app){
  const stableSet = !!STABLE_URL;
  app.innerHTML=`
    <h1>🐴 EquiStories Art Tracker</h1>
    <div style="max-width:460px;margin:40px auto;background:#241a14;border:1px solid #4a392a;border-radius:8px;padding:20px;">
      <h3 style="margin-top:0;color:#c98a3a;">Sign in to your stable</h3>
      <p class="small">Use the same User ID and password as your Buxx Bank account.</p>
      ${!stableSet?'<div style="background:rgba(177,71,63,.15);border:1px solid #b1473f;border-radius:6px;padding:8px;margin-bottom:10px;font-size:.85em;color:#e08080;">⚠️ Stable Data URL not configured — expand Admin section below first.</div>':""}
      <div style="margin-bottom:8px;"><label class="small">Bank User ID</label><input id="li_user" placeholder="Your userId" style="width:100%;padding:8px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;box-sizing:border-box;margin-top:3px;" /></div>
      <div style="margin-bottom:10px;"><label class="small">Password</label><input id="li_pass" type="password" placeholder="Your password" style="width:100%;padding:8px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;box-sizing:border-box;margin-top:3px;" /></div>
      <button id="li_go" style="width:100%;padding:10px;background:#c98a3a;color:#241a14;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:.95em;">🔐 Sign In</button>
      <div id="li_result" style="margin-top:8px;"></div>
      <hr style="border:none;border-top:1px solid #4a392a;margin:16px 0;" />
      <details ${!stableSet?"open":""}>
        <summary style="cursor:pointer;font-size:.85em;color:#b5a392;">⚙️ Admin: Configure Stable Data URL</summary>
        <div style="margin-top:10px;">
          <p class="small">Paste the /exec URL from your deployed Stable Data Apps Script.</p>
          ${stableSet?'<div style="color:#7a9b6e;font-size:.82em;margin-bottom:6px;">✅ Stable URL is configured.</div>':'<div style="color:#b1473f;font-size:.82em;margin-bottom:6px;">⚠️ Not configured yet.</div>'}
          <input id="li_stable_url" placeholder="https://script.google.com/macros/s/…/exec" value="${STABLE_URL||''}" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;box-sizing:border-box;margin-bottom:6px;" />
          <div id="li_admin_lock" style="${stableSet?'':'display:none;'}">
            <input id="li_admin_pass" type="password" placeholder="Admin passcode" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;box-sizing:border-box;margin-bottom:6px;" />
          </div>
          <button id="li_save_url" style="width:100%;padding:8px;background:#2c2118;color:#f1e6d8;border:1px solid #4a392a;border-radius:5px;cursor:pointer;">💾 Save Stable URL</button>
          <div id="li_url_result" style="margin-top:4px;font-size:.82em;"></div>
        </div>
      </details>
    </div>
  `;

  app.querySelector('#li_go').onclick = async()=>{
    const userId=app.querySelector('#li_user').value.trim();
    const password=app.querySelector('#li_pass').value.trim();
    const res=app.querySelector('#li_result');
    if(!userId||!password){ res.innerHTML='<div style="color:#e08080;font-size:.85em;">Please enter both User ID and password.</div>'; return; }
    if(!STABLE_URL){ res.innerHTML='<div style="color:#e08080;font-size:.85em;">⚠️ Configure the Stable Data URL first (Admin section below).</div>'; return; }
    res.innerHTML='<div class="small">Signing in…</div>';
    const data=await gasPost({action:'loginPlayer',userId,password});
    if(data?.success){
      bankAccount={userId,password,linked:true};
      saveBankAccount();
      res.innerHTML='<div style="color:#7a9b6e;font-size:.85em;">✅ Welcome, '+data.data.displayName+'! Loading stable…</div>';
      await loadFromSheets();
      render();
    } else {
      res.innerHTML='<div style="color:#e08080;font-size:.85em;">❌ '+(data?.error||'Login failed — check your User ID and password.')+'</div>';
    }
  };
  app.querySelector('#li_pass').onkeydown=e=>{ if(e.key==='Enter') app.querySelector('#li_go').click(); };

  app.querySelector('#li_save_url').onclick=()=>{
    const url=app.querySelector('#li_stable_url').value.trim();
    const res=app.querySelector('#li_url_result');
    const adminInp=app.querySelector('#li_admin_pass');
    if(!url){ res.innerHTML='<span style="color:#e08080;">Please paste a URL first.</span>'; return; }
    if(!url.includes('script.google.com')){ res.innerHTML='<span style="color:#e08080;">That does not look like a Google Apps Script URL.</span>'; return; }
    // If URL already set, require passcode
    if(STABLE_URL && adminInp){
      if(adminInp.value !== 'Eqistories123'){ res.innerHTML='<span style="color:#e08080;">Incorrect admin passcode.</span>'; return; }
    }
    STABLE_URL=url;
    localStorage.setItem('equi_stable_url',url);
    res.innerHTML='<span style="color:#7a9b6e;">✅ Saved!</span>';
    setTimeout(()=>renderLoginScreen(app), 800);
  };
}

// ============================================
// ROSTER TAB
// ============================================

function renderRoster(){
  const wrap = el('div');

  // Add horse form
  const form = el('div','card',`
    <h3>Add a Horse</h3>
    <div class="row">
      <div><label>Name</label><input id="nh_name" placeholder="e.g. Banshee" /></div>
      <div><label>Age</label><input id="nh_age" type="number" min="0" value="3" style="max-width:80px;" /></div>
      <div><label>Breed</label><input id="nh_breed" placeholder="e.g. Thoroughbred" /></div>
    </div>
    <div class="row" style="margin-top:8px;">
      <div><label>Gender <span class="small">(optional)</span></label>
        <select id="nh_gender">
          <option value="">— unset —</option>
          <option>Mare</option><option>Stallion</option><option>Gelding</option>
          <option>Filly</option><option>Colt</option><option>Rig</option>
        </select>
      </div>
      <div><label>Phenotype <span class="small">(optional)</span></label><input id="nh_pheno" placeholder="e.g. Bay, Dapple Grey" /></div>
      <div><label>Genotype <span class="small">(optional)</span></label><input id="nh_geno" placeholder="e.g. Ee Aa nCr" /></div>
    </div>
    <button id="nh_add" style="margin-top:10px;">Add to Stable</button>
  `);
  wrap.appendChild(form);
  form.querySelector('#nh_add').onclick=()=>{
    const name=form.querySelector('#nh_name').value.trim();
    const age=form.querySelector('#nh_age').value;
    const breed=form.querySelector('#nh_breed').value.trim()||"Unspecified";
    const gender=form.querySelector('#nh_gender').value;
    const phenotype=form.querySelector('#nh_pheno').value.trim();
    const genotype=form.querySelector('#nh_geno').value.trim();
    if(!name){alert("Give your horse a name first!"); return;}
    const h=newHorse({name,age,breed,gender,phenotype,genotype});
    state.horses.push(h);
    addLog(`🐎 ${h.name} (${breed}) joined the stable.`);
    save(); render();
  };

  // Horse cards
  state.horses.forEach(h=>{
    const open = expandedLogs.has(h.id);
    const pct = h.level>=10?100:Math.min(100,((h.exp-LEVEL_TABLE[h.level].exp)/(LEVEL_TABLE[h.level+1].exp-LEVEL_TABLE[h.level].exp))*100);
    const photoHtml = h.profileImage
      ? `<img src="${h.profileImage}" class="horse-photo" />`
      : `<div class="horse-photo-placeholder">🐴</div>`;
    const statBars = STATS.map(s=>{
      const base=h.stats[s]||0, bonus=getEquippedStatBonus(h,s);
      return `<div class="statbar-wrap">
        <span style="width:72px;font-size:.78em;">${STAT_LABELS[s]}</span>
        <div class="statbar-bg"><div class="statbar-fill" style="width:${Math.min(100,base+bonus)}%"></div></div>
        <span style="font-size:.75em;width:36px;text-align:right;">${base+bonus}${bonus?`<span style="color:var(--good);">+${bonus}</span>`:""}</span>
      </div>`;
    }).join("");

    let slots="";
    for(let i=0;i<h.breedingSlots;i++){
      const rec=(h.breedingRecords||[]).find(r=>r.slotIndex===i);
      slots+=`<div class="slot${rec?" filled":""}" data-act="slot-click" data-id="${h.id}" data-slot="${i}" style="cursor:pointer;" title="${rec?('Used — '+rec.partnerName):'Click to mark as used'}">${i+1}</div>`;
    }

    const artLogHtml = open ? `
      <div class="artlog-panel">
        ${h.artLog.length ? h.artLog.map(e=>`
          <div class="artlog-entry">
            ${e.image?`<img src="${e.image}" class="artlog-thumb" data-lightbox="${e.image}" data-caption="${e.label}" style="cursor:zoom-in;" />`:""}
            <b>${e.label}</b> ${e.type==="competition"&&e.placement?`<span class="tag">${["1st","2nd","3rd","4th","5th","6th"][e.placement-1]||e.placement+"th"}</span>`:""}
            <span class="tag">+${e.exp} EXP</span>
            ${e.link?`<a href="${e.link}" target="_blank" class="artlog-link" style="font-size:.8em;margin-left:6px;">🔗 View</a>`:""}
            <div class="small" style="margin-top:2px;">${e.art||""}${e.lit?` · ${e.lit}`:""}</div>
          </div>`).join("") : '<div class="small">No entries yet.</div>'}
      </div>` : "";

    const refHtml = h.referenceImage
      ? `<div style="margin-top:8px;">
          <div class="small" style="margin-bottom:3px;">📋 Reference Sheet ${h.referenceLink?`<a href="${h.referenceLink}" target="_blank" class="artlog-link">🔗 View</a>`:""}</div>
          <img src="${h.referenceImage}" style="max-width:100%;max-height:200px;border-radius:6px;border:1px solid #4a392a;object-fit:contain;" />
        </div>`
      : `<div class="small" style="margin-top:6px;color:#5a4a3a;">📋 No reference sheet uploaded.</div>`;

    // Tack equip section
    const inv = state.tackInventory||[];
    const equippedHtml = (h.tackEquipped||[]).length
      ? (h.tackEquipped||[]).map(tid=>{
          const item=inv.find(t=>t.id===tid);
          if(!item) return "";
          const statsStr=Object.entries(item.stats||{}).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
          return `<span class="tag" style="background:#1a3a2a;color:#a0e8c0;border-color:#3a7a5a;">${item.name}${statsStr?` (${statsStr})`:""} <span data-act="unequip-tack" data-id="${h.id}" data-tack="${item.id}" style="cursor:pointer;">✕</span></span>`;
        }).join(" ")
      : `<span class="small">Nothing equipped.</span>`;
    const availableTack = inv.filter(t=>!(h.tackEquipped||[]).includes(t.id));

    const card = el('div','horse-card');
    card.innerHTML=`
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:none;">
          ${photoHtml}
          <input type="file" accept="image/*" data-photo-input="${h.id}" style="display:none;" />
          <button class="secondary" data-act="upload-photo" data-id="${h.id}" style="font-size:.72em;padding:3px 7px;margin-top:0;">📷</button>
        </div>
        <div style="flex:1;">
          <div style="display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;">
            <a href="?horse=${h.id}" style="font-size:1.1em;color:var(--accent);font-weight:bold;text-decoration:none;">${h.name}</a>
            <span class="tag">Lvl ${h.level}</span>
            <a href="?horse=${h.id}" class="small" style="color:var(--accent);">🔗 Profile Page</a>
          </div>
          <div class="small">${h.breed} · Age ${h.age} (${h.stage})${h.gender?` · ${h.gender}`:""}</div>
          <div class="small">EXP: ${h.exp} / ${h.level<10?LEVEL_TABLE[h.level+1].exp:"MAX"}</div>
          <div class="expbar-bg"><div class="expbar-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="statgrid" style="margin-top:10px;">${statBars}</div>

      <div style="margin-top:8px;">
        <div class="small" style="margin-bottom:3px;">🏇 Equipped Tack:</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;">${equippedHtml}</div>
        ${availableTack.length ? `
          <select data-act="equip-select" data-id="${h.id}" style="margin-top:4px;width:auto;display:inline-block;font-size:.82em;">
            <option value="">+ Equip tack…</option>
            ${availableTack.map(t=>`<option value="${t.id}">${t.name} (${t.category})</option>`).join("")}
          </select>` : `<div class="small" style="margin-top:4px;">No more tack available — add some in the Tack Inventory tab.</div>`}
      </div>

      <div class="small" style="margin-top:8px;">Breeding Slots <span style="opacity:.7;">(click a slot to mark used)</span>:</div>
      <div class="breedslots">${slots||'<span class="small">none yet</span>'}</div>

      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
        <button class="secondary" data-act="toggle-log" data-id="${h.id}" style="font-size:.8em;padding:4px 10px;margin-top:0;">📖 ${open?"Hide":"Show"} Art Log (${h.artLog.length})</button>
        <button class="secondary" data-act="edit-lineage" data-id="${h.id}" style="font-size:.8em;padding:4px 10px;margin-top:0;">🧬 Lineage</button>
        <button class="secondary" data-act="edit-profile" data-id="${h.id}" style="font-size:.8em;padding:4px 10px;margin-top:0;">✏️ Edit Profile</button>
        <button class="secondary" data-act="edit-worth" data-id="${h.id}" style="font-size:.8em;padding:4px 10px;margin-top:0;">💰 Net Worth</button>
        <button class="secondary" data-act="upload-ref" data-id="${h.id}" style="font-size:.8em;padding:4px 10px;margin-top:0;">📋 ${h.referenceImage?"Change":"Upload"} Ref</button>
        <input type="file" accept="image/*" data-ref-input="${h.id}" style="display:none;" />
        <button class="danger" data-act="del" data-id="${h.id}" style="font-size:.8em;padding:4px 10px;margin-top:0;">Remove</button>
      </div>
      ${refHtml}
      ${artLogHtml}
    `;
    wrap.appendChild(card);
  });

  if(!state.horses.length) wrap.appendChild(el('div','small','<div style="padding:12px;color:#5a4a3a;">No horses yet — add one above!</div>'));

  // Event handlers
  wrap.querySelectorAll('[data-act="toggle-log"]').forEach(b=>b.onclick=()=>{
    if(expandedLogs.has(b.dataset.id)) expandedLogs.delete(b.dataset.id);
    else expandedLogs.add(b.dataset.id);
    render();
  });
  wrap.querySelectorAll('[data-act="del"]').forEach(b=>b.onclick=()=>{
    if(!confirm('Remove this horse? This cannot be undone.')) return;
    const delId=b.dataset.id;
    state.horses=state.horses.filter(x=>x.id!==delId);
    deleteHorseFromSheets(delId);
    save(); render();
  });
  wrap.querySelectorAll('[data-act="upload-photo"]').forEach(b=>b.onclick=()=>
    wrap.querySelector(`[data-photo-input="${b.dataset.id}"]`).click());
  wrap.querySelectorAll('[data-photo-input]').forEach(inp=>inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{
      const h=state.horses.find(x=>x.id===inp.dataset.photoInput);
      if(h){h.profileImage=r.result; save(); render();}
    }; r.readAsDataURL(f);
  });
  wrap.querySelectorAll('[data-act="upload-ref"]').forEach(b=>b.onclick=()=>
    wrap.querySelector(`[data-ref-input="${b.dataset.id}"]`).click());
  wrap.querySelectorAll('[data-ref-input]').forEach(inp=>inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{
      const h=state.horses.find(x=>x.id===inp.dataset.refInput);
      if(h){h.referenceImage=r.result; save(); render();}
    }; r.readAsDataURL(f);
  });
  wrap.querySelectorAll('[data-act="equip-select"]').forEach(sel=>sel.onchange=()=>{
    const h=state.horses.find(x=>x.id===sel.dataset.id);
    if(h && sel.value){
      h.tackEquipped=h.tackEquipped||[];
      h.tackEquipped.push(sel.value);
      save(); render();
    }
  });
  wrap.querySelectorAll('[data-act="unequip-tack"]').forEach(span=>span.onclick=()=>{
    const h=state.horses.find(x=>x.id===span.dataset.id);
    if(h){ h.tackEquipped=(h.tackEquipped||[]).filter(id=>id!==span.dataset.tack); save(); render(); }
  });
  wrap.querySelectorAll('[data-act="slot-click"]').forEach(slot=>slot.onclick=()=>{
    showBreedingSlotModal(slot.dataset.id, Number(slot.dataset.slot));
  });
  wrap.querySelectorAll('[data-act="edit-lineage"]').forEach(b=>b.onclick=()=>showLineageModal(b.dataset.id));
  wrap.querySelectorAll('[data-act="edit-profile"]').forEach(b=>b.onclick=()=>showProfileModal(b.dataset.id));
  wrap.querySelectorAll('[data-act="edit-worth"]').forEach(b=>b.onclick=()=>showNetWorthModal(b.dataset.id));

  return wrap;
}

// BREEDING SLOT MODAL

function showBreedingSlotModal(horseId, slotIndex){
  const h=state.horses.find(x=>x.id===horseId);
  if(!h) return;
  const existing=(h.breedingRecords||[]).find(r=>r.slotIndex===slotIndex);

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid #c98a3a;border-radius:10px;padding:24px;max-width:480px;width:100%;color:#f1e6d8;font-family:Georgia,serif;">
    <h3 style="margin-top:0;color:#c98a3a;">🐴 Breeding Slot ${slotIndex+1} — ${h.name}</h3>

      <p style="color:#b5a392;">This slot is marked as used.</p>
      <div style="background:#15100c;padding:10px;border-radius:6px;margin-bottom:10px;">
        <b>${existing.role==="sire"?"Sired with":"Bred to"}:</b> ${existing.partnerName}${existing.partnerOwner?` (${existing.partnerOwner})`:""}<br>

        ${existing.note?`<br><i>${existing.note}</i>`:""}

        <option value="">— select foal from roster —</option>
        ${state.horses.filter(x=>x.id!==h.id).map(x=>`<option value="${x.id}">${x.name}</option>`).join("")}
      </select>
      <button id="bs_link_foal" style="margin-top:8px;width:100%;background:#c98a3a;color:#241a14;border:none;padding:9px;border-radius:6px;font-weight:bold;cursor:pointer;">🔗 Link Foal</button>

      <p style="color:#b5a392;">Mark this slot as used by recording the breeding pairing.</p>
      <label style="font-size:.8em;color:#b5a392;text-transform:uppercase;">This horse's role</label>

        <option value="sire">Sire (this horse is the father)</option>
        <option value="dam">Dam (this horse is the mother)</option>
      </select>
      <label style="font-size:.8em;color:#b5a392;text-transform:uppercase;margin-top:8px;display:block;">Partner's Name</label>
      <input id="bs_partner_name" placeholder="e.g. Moonshadow" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-top:4px;" />
      <label style="font-size:.8em;color:#b5a392;text-transform:uppercase;margin-top:8px;display:block;">Partner's Owner <span style="opacity:.7;">(optional)</span></label>
      <input id="bs_partner_owner" placeholder="e.g. @username" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-top:4px;" />

      <input id="bs_note" placeholder="Any notes about this breeding" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-top:4px;" />
      <button id="bs_save" style="margin-top:12px;width:100%;background:#c98a3a;color:#241a14;border:none;padding:9px;border-radius:6px;font-weight:bold;cursor:pointer;">✅ Mark Slot as Used</button>
    `}
    <button id="bs_cancel" style="margin-top:8px;width:100%;background:#2c2118;color:#f1e6d8;border:1px solid #4a392a;padding:9px;border-radius:6px;cursor:pointer;">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#bs_cancel').onclick=()=>overlay.remove();

  const saveBtn=overlay.querySelector('#bs_save');
  if(saveBtn) saveBtn.onclick=()=>{
    const role=overlay.querySelector('#bs_role').value;
    const partnerName=overlay.querySelector('#bs_partner_name').value.trim();
    const partnerOwner=overlay.querySelector('#bs_partner_owner').value.trim();
    const date=overlay.querySelector('#bs_date').value.trim();
    const note=overlay.querySelector('#bs_note').value.trim();
    if(!partnerName){ alert("Please enter the partner's name."); return; }
    if(!h.breedingRecords) h.breedingRecords=[];
    h.breedingRecords.push({ id:uid2(), slotIndex, role, partnerName, partnerOwner, date, note, foalId:null, foalName:"" });
    h.breedingFilled=(h.breedingFilled||0)+1;
    addLog(`🐴 ${h.name}'s breeding slot ${slotIndex+1} marked as used (${role==="sire"?"sired":"bred"} with ${partnerName}).`);
    save(); overlay.remove(); render();
  };

  const clearBtn=overlay.querySelector('#bs_clear');
  if(clearBtn) clearBtn.onclick=()=>{
    if(!confirm('Clear this breeding record? This cannot be undone.')) return;
    h.breedingRecords=(h.breedingRecords||[]).filter(r=>r.slotIndex!==slotIndex);
    save(); overlay.remove(); render();
  };

  const linkBtn=overlay.querySelector('#bs_link_foal');
  if(linkBtn) linkBtn.onclick=()=>{
    const foalId=overlay.querySelector('#bs_foal_select').value;
    if(!foalId){ alert("Please select a foal first."); return; }
    const foal=state.horses.find(x=>x.id===foalId);
    const rec=(h.breedingRecords||[]).find(r=>r.slotIndex===slotIndex);
    if(rec && foal){
      rec.foalId=foal.id; rec.foalName=foal.name;
      addLog(`🔗 Linked ${h.name}'s breeding record to foal ${foal.name}.`);
      save(); overlay.remove(); render();
    }
  };
}

// Slot definitions — key, label, column (1=horse, 2=parents, 3=grandparents, 4=great-grandparents)
const PED_SLOTS = [
  {key:"sire",  label:"Sire",  col:2, parent:null,   side:"top"},
  {key:"dam",   label:"Dam",   col:2, parent:null,   side:"bot"},
  {key:"ss",    label:"SS",    col:3, parent:"sire", side:"top"},
  {key:"sd",    label:"SD",    col:3, parent:"sire", side:"bot"},
  {key:"ds",    label:"DS",    col:3, parent:"dam",  side:"top"},
  {key:"dd",    label:"DD",    col:3, parent:"dam",  side:"bot"},
  {key:"sss",   label:"SSS",   col:4, parent:"ss",   side:"top"},
  {key:"ssd",   label:"SSD",   col:4, parent:"ss",   side:"bot"},
  {key:"sds",   label:"SDS",   col:4, parent:"sd",   side:"top"},
  {key:"sdd",   label:"SDD",   col:4, parent:"sd",   side:"bot"},
  {key:"dss",   label:"DSS",   col:4, parent:"ds",   side:"top"},
  {key:"dsd",   label:"DSD",   col:4, parent:"ds",   side:"bot"},
  {key:"dds",   label:"DDS",   col:4, parent:"dd",   side:"top"},
  {key:"ddd",   label:"DDD",   col:4, parent:"dd",   side:"bot"},
];

function pedEntry(h, key){
  return (h.pedigree || {})[key] || {name:"", link:"", inRosterId:""};
}

function pedLink(entry, label){
  const name = entry.name || "Unknown";
  const inRoster = entry.inRosterId ? state.horses.find(x=>x.id===entry.inRosterId) : null;
  const href = inRoster ? `?horse=${inRoster.id}` : (entry.link || null);
  if(href && name !== "Unknown"){
    return `<a href="${href}" ${!inRoster?'target="_blank"':''} style="color:#c98a3a;text-decoration:none;font-weight:bold;">${name}</a>`;
  }
  return `<span style="color:${name==="Unknown"?"#4a392a":"#f1e6d8"};font-weight:${name!=="Unknown"?"bold":"normal"};">${name}</span>`;
}

// Render the visual pedigree chart (matches the layout in the screenshot)
function renderPedigreeChart(h){
  const p = h.pedigree || {};

  function row(key, label, indent){
    const e = pedEntry(h, key);
    const indentStyle = `padding-left:${indent}px;`;
    return `<div style="${indentStyle}font-size:.82em;padding:2px 0;display:flex;align-items:center;gap:6px;">
      <span style="color:#4a392a;min-width:32px;font-size:.9em;">${label}:</span>
      ${pedLink(e, label)}
    </div>`;
  }

  return `<div style="font-family:'Courier New',monospace;background:#15100c;border:1px solid #4a392a;border-radius:8px;padding:14px;line-height:1.8;">
    <div style="font-size:.78em;color:#b5a392;margin-bottom:8px;font-family:Georgia,serif;">Bloodline:</div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;">
      <!-- Column layout matching screenshot -->
      <div>
        <div style="font-size:.85em;padding:2px 0;"><b style="color:#c98a3a;">Sire:</b> ${pedLink(pedEntry(h,'sire'),'Sire')}</div>
        <div style="font-size:.85em;padding:2px 0;margin-top:4px;"><b style="color:#c98a3a;">Dam:</b> ${pedLink(pedEntry(h,'dam'),'Dam')}</div>
      </div>
    </div>

    <div style="margin-top:10px;border-left:2px solid #4a392a;padding-left:10px;">
      <!-- Sire side -->
      <div style="margin-bottom:2px;">${row('ss','SS',0)}</div>
      <div style="margin-bottom:8px;padding-left:20px;">
        ${row('sss','SSS',0)}
        ${row('ssd','SSD',0)}
      </div>
      <div style="margin-bottom:2px;">${row('sd','SD',0)}</div>
      <div style="margin-bottom:8px;padding-left:20px;">
        ${row('sds','SDS',0)}
        ${row('sdd','SDD',0)}
      </div>
    </div>

    <div style="margin-top:6px;border-left:2px solid #4a392a;padding-left:10px;">
      <!-- Dam side -->
      <div style="margin-bottom:2px;">${row('ds','DS',0)}</div>
      <div style="margin-bottom:8px;padding-left:20px;">
        ${row('dss','DSS',0)}
        ${row('dsd','DSD',0)}
      </div>
      <div style="margin-bottom:2px;">${row('dd','DD',0)}</div>
      <div style="padding-left:20px;">
        ${row('dds','DDS',0)}
        ${row('ddd','DDD',0)}
      </div>
    </div>
  </div>`;
}

  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';
  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid #c98a3a;border-radius:10px;padding:24px;max-width:560px;width:100%;color:#f1e6d8;font-family:Georgia,serif;margin:auto;">
    <h3 style="margin-top:0;color:#c98a3a;">🧬 Pedigree Editor — ${h.name}</h3>
    <p style="color:#b5a392;font-size:.85em;margin-top:0;">Fill in up to 3 generations. Names can link to on-site horse profiles or external pages. Leave blank for Unknown.</p>

    <details open style="margin-bottom:8px;"><summary style="cursor:pointer;color:#c98a3a;font-weight:bold;padding:6px 0;">Generation 1 — Parents</summary>
      ${slotFields('sire','Sire (Father)')}
      ${slotFields('dam','Dam (Mother)')}
    </details>

    <details style="margin-bottom:8px;"><summary style="cursor:pointer;color:#c98a3a;font-weight:bold;padding:6px 0;">Generation 2 — Grandparents</summary>
      ${slotFields('ss','SS - Sires Sire')}
      ${slotFields('sd','SD - Sires Dam')}
      ${slotFields('ds','DS - Dams Sire')}
      ${slotFields('dd','DD - Dams Dam')}
    </details>

    <details style="margin-bottom:8px;"><summary style="cursor:pointer;color:#c98a3a;font-weight:bold;padding:6px 0;">Generation 3 — Great-Grandparents</summary>
      ${slotFields('sss','SSS')}${slotFields('ssd','SSD')}
      ${slotFields('sds','SDS')}${slotFields('sdd','SDD')}
      ${slotFields('dss','DSS')}${slotFields('dsd','DSD')}
      ${slotFields('dds','DDS')}${slotFields('ddd','DDD')}
    </details>

    <button id="ln_save" style="margin-top:10px;width:100%;background:#c98a3a;color:#241a14;border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:.95em;">💾 Save Pedigree</button>

  };
}

function renderTraining(){
  const wrap=el('div');
  if(!state.horses.length){ wrap.innerHTML='<div class="card small">Add a horse on the Stable Roster tab first.</div>'; return wrap; }

  const trainingOpts = TRAININGS.map(t=>`<option value="${t.id}">${t.name}</option>`).join("");
  let combinedMode=false;
  let selectedBonuses=new Set();
  let uploadedImage=null;

  const card=el('div','card');
  card.innerHTML=`
    <h3>Log Training</h3>
    <div class="row">
      <div><label>Horse</label>
        <select id="tr_horse">${state.horses.map(h=>`<option value="${h.id}">${h.name}</option>`).join("")}</select>
      </div>
      <div style="flex:none;">
        <label>Mode</label>
        <div class="pill-select" style="margin-top:4px;">
          <div class="pill active" id="tr_mode_single">Single</div>
          <div class="pill" id="tr_mode_combined">⚡ Combined</div>
        </div>
      </div>
    </div>
    <div class="row" style="margin-top:8px;">
      <div><label id="tr_lbl1">Training Type</label><select id="tr_type">${trainingOpts}</select></div>
      <div id="tr_type2_wrap" style="display:none;"><label>Second Training</label><select id="tr_type2">${trainingOpts}</select></div>
    </div>
    <div id="tr_prompt"></div>
    <div style="margin-top:12px;">
      <label>Art Image <span class="required">* Required</span></label>
      <p class="small" style="margin:2px 0 6px;">Upload the artwork for this training entry. Image is required to log.</p>
      <input type="file" id="tr_image_file" accept="image/*" />
      <div id="tr_image_preview" style="margin-top:6px;"></div>
    </div>
    <div class="row" style="margin-top:10px;">
      <div>
        <label>Art Type <span class="required">* Required</span></label>
        <select id="tr_art">
          <option value="">— select art type —</option>
          ${Object.keys(ART_EXP).map(k=>`<option value="${k}">${k} (+${ART_EXP[k]} EXP)</option>`).join("")}
        </select>
      </div>
      <div>
        <label>Literature Word Count <span class="small">(optional)</span></label>
        <input type="number" id="tr_lit" min="0" placeholder="e.g. 350 — min 200 for EXP" />
        <div class="small" id="tr_lit_preview" style="margin-top:2px;"></div>
      </div>
    </div>
    <div style="margin-top:8px;">
      <label>Bonus Elements <span class="small">(optional)</span></label>
      <div class="pill-select" id="tr_bonuses">
        ${Object.keys(BONUS_EXP).map(k=>`<div class="pill" data-bonus="${k}">${k} (+${BONUS_EXP[k]})</div>`).join("")}
      </div>
    </div>
    <div style="margin-top:8px;"><label>Link to Art <span class="small">(optional)</span></label><input id="tr_link" placeholder="https://…" /></div>
    <button id="tr_go" style="margin-top:12px;">✅ Log Training</button>
    <div id="tr_result"></div>
  `;
  wrap.appendChild(card);

  function refreshPrompt(){
    const t=TRAININGS.find(x=>x.id===card.querySelector('#tr_type').value);
    const t2=combinedMode?TRAININGS.find(x=>x.id===card.querySelector('#tr_type2').value):null;
    if(!t) return;
    const allStats={...t.stats};
    if(t2) Object.entries(t2.stats).forEach(([s,v])=>allStats[s]=(allStats[s]||0)+v);
    const statsStr=Object.entries(allStats).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
    card.querySelector('#tr_prompt').innerHTML=`<div class="prompt-box">
      ${t2?`⚡ <b>${t.name}</b> + <b>${t2.name}</b>`:`📝 <b>${t.name}</b>`}<br>
      <span style="font-size:.85em;">${t.prompt}${t2?`<br><span style="opacity:.8;">${t2.prompt}</span>`:""}</span><br>
      <span class="small">Stats: ${statsStr}</span>
    </div>`;
  }
  refreshPrompt();
  card.querySelector('#tr_type').onchange=refreshPrompt;
  card.querySelector('#tr_type2').onchange=refreshPrompt;

  card.querySelector('#tr_mode_single').onclick=()=>{
    combinedMode=false;
    card.querySelector('#tr_mode_single').classList.add('active');
    card.querySelector('#tr_mode_combined').classList.remove('active');
    card.querySelector('#tr_type2_wrap').style.display='none';
    card.querySelector('#tr_lbl1').textContent='Training Type';
    refreshPrompt();
  };
  card.querySelector('#tr_mode_combined').onclick=()=>{
    combinedMode=true;
    card.querySelector('#tr_mode_combined').classList.add('active');
    card.querySelector('#tr_mode_single').classList.remove('active');
    card.querySelector('#tr_type2_wrap').style.display='';
    card.querySelector('#tr_lbl1').textContent='First Training';
    refreshPrompt();
  };

  card.querySelectorAll('[data-bonus]').forEach(p=>p.onclick=()=>{
    const k=p.dataset.bonus;
    if(selectedBonuses.has(k)){selectedBonuses.delete(k);p.classList.remove('active');}
    else{selectedBonuses.add(k);p.classList.add('active');}
  });

  card.querySelector('#tr_lit').oninput=()=>{
    const wc=parseInt(card.querySelector('#tr_lit').value)||0;
    const exp=calcLitExp(wc);
    const prev=card.querySelector('#tr_lit_preview');
    prev.textContent=wc===0?"":(wc<200?"⚠️ Min 200 words for EXP":`✅ +${exp} EXP`);
    prev.style.color=wc<200&&wc>0?"#c9a23a":"#7a9b6e";
  };

  card.querySelector('#tr_image_file').onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{
      uploadedImage=r.result;
      card.querySelector('#tr_image_preview').innerHTML=`<img src="${uploadedImage}" style="max-height:120px;border-radius:6px;border:1px solid #4a392a;object-fit:contain;" />`;
    }; r.readAsDataURL(f);
  };

  card.querySelector('#tr_go').onclick=()=>{
    const hId=card.querySelector('#tr_horse').value;
    const h=state.horses.find(x=>x.id===hId);
    const tId=card.querySelector('#tr_type').value;
    const tId2=combinedMode?card.querySelector('#tr_type2').value:null;
    const artType=card.querySelector('#tr_art').value;
    const litWords=parseInt(card.querySelector('#tr_lit').value)||0;
    const link=card.querySelector('#tr_link').value.trim();
    const res=card.querySelector('#tr_result');

    if(!uploadedImage){ res.innerHTML='<div class="result fail">🖼️ An image is required to log training.</div>'; return; }
    if(!artType){ res.innerHTML='<div class="result fail">Please select an art type.</div>'; return; }
    if(combinedMode && tId===tId2){ res.innerHTML='<div class="result fail">Please choose two different training types.</div>'; return; }

    const t=TRAININGS.find(x=>x.id===tId);
    const t2=tId2?TRAININGS.find(x=>x.id===tId2):null;
    const label=t2?`${t.name} + ${t2.name}`:t.name;
    const allStats={...t.stats};
    if(t2) Object.entries(t2.stats).forEach(([s,v])=>allStats[s]=(allStats[s]||0)+v);
    Object.entries(allStats).forEach(([s,v])=>h.stats[s]=(h.stats[s]||0)+v);

    let expGain=ART_EXP[artType]||0;
    const sources=[`${artType} (+${ART_EXP[artType]})`];
    const litExp=calcLitExp(litWords);
    if(litExp>0){expGain+=litExp; sources.push(`Lit ${litWords}w (+${litExp})`);}
    selectedBonuses.forEach(k=>{if(BONUS_EXP[k]){expGain+=BONUS_EXP[k]; sources.push(`${k} (+${BONUS_EXP[k]})`);}});
    h.exp+=expGain;
    checkLevelUp(h);

    const trainEntry={day:state.log.length+1,type:"training",label,art:artType,lit:litWords?`${litWords} words`:null,bonuses:[...selectedBonuses],exp:expGain,link:link||null,image:uploadedImage};
    h.artLog.unshift(trainEntry);
    const statsStr=Object.entries(allStats).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
    addLog(`🎨 ${h.name} — ${label} (${statsStr}) · +${expGain} EXP`);
    saveHorse(h);
    saveArtEntry(h, trainEntry);
    save();

    res.innerHTML=`<div class="result success">✅ Training logged! ${statsStr} · +${expGain} EXP (${sources.join(", ")})</div>`;
    uploadedImage=null;
    card.querySelector('#tr_image_preview').innerHTML='';
    card.querySelector('#tr_image_file').value='';
    card.querySelector('#tr_lit').value='';
    card.querySelector('#tr_lit_preview').textContent='';
    card.querySelector('#tr_link').value='';
    selectedBonuses.clear();
    card.querySelectorAll('[data-bonus]').forEach(p=>p.classList.remove('active'));
  };

  return wrap;
}

    <p class="small" style="margin-top:0;color:#b5a392;">Record any competition — past or present. Add ribbons, trophies, and prizes as photos.</p>

    <div class="row">
      <div><label>Horse</label>
        <select id="cs_horse">${state.horses.map(h=>`<option value="${h.id}">${h.name}</option>`).join("")}</select>

    </div>
    <div class="row" style="margin-top:8px;">
      <div><label>Show / Venue Name</label><input id="cs_venue" placeholder="e.g. Spring Classic 2025" /></div>
      <div><label>Date <span class="small">(optional)</span></label><input id="cs_date" placeholder="e.g. April 2025" /></div>
    </div>
    <div class="row" style="margin-top:8px;">
      <div><label>Placement</label>
        <select id="cs_place">
          <option value="">— select —</option>
          <option value="1">🥇 1st Place</option>
          <option value="2">🥈 2nd Place</option>
          <option value="3">🥉 3rd Place</option>
          <option value="4">4th Place</option>
          <option value="5">5th Place</option>
          <option value="6">6th Place</option>
          <option value="0">Participant / No placement</option>
        </select>
      </div>
      <div><label>Class / Division <span class="small">(optional)</span></label>
        <input id="cs_class" placeholder="e.g. Open Hunter, Advanced XC" />
      </div>
    </div>
    <div style="margin-top:8px;">
      <label>Notes <span class="small">(optional)</span></label>
      <input id="cs_note" placeholder="e.g. Double clear, Reserve Champion, personal best time" />
    </div>

    <hr style="border:none;border-top:1px solid #4a392a;margin:14px 0;" />

    <label>Show Art / Photo <span class="small">(optional — the artwork or photo from this show)</span></label>
    <p class="small" style="margin:2px 0 6px;">This image appears in the art log and on the ribbon wall for placed entries.</p>
    <input type="file" id="cs_art_file" accept="image/*" />
    <div id="cs_art_preview" style="margin-top:6px;"></div>

    ${Object.keys(ART_EXP).length ? `
    <div class="row" style="margin-top:8px;">
      <div><label>Art Type <span class="small">(for EXP — optional)</span></label>
        <select id="cs_art_type">
          <option value="">— no art / no EXP —</option>
          ${Object.keys(ART_EXP).map(k=>`<option value="${k}">${k} (+${ART_EXP[k]} EXP)</option>`).join("")}
        </select>
      </div>
      <div><label>Literature Word Count <span class="small">(optional)</span></label>
        <input type="number" id="cs_lit" min="0" placeholder="min 200 for EXP" />
        <div class="small" id="cs_lit_preview" style="margin-top:2px;"></div>
      </div>
    </div>
    <div style="margin-top:8px;">
      <label>Bonus Elements <span class="small">(optional)</span></label>
      <div class="pill-select" id="cs_bonuses">
        ${Object.keys(BONUS_EXP).map(k=>`<div class="pill" data-bonus="${k}">${k} (+${BONUS_EXP[k]})</div>`).join("")}
      </div>
    </div>
    <div style="margin-top:8px;"><label>Link to Art <span class="small">(optional)</span></label>
      <input id="cs_link" placeholder="https://… (DeviantArt, Toyhouse, etc.)" />
    </div>` : ""}

    <hr style="border:none;border-top:1px solid #4a392a;margin:14px 0;" />

    <label>Prizes, Ribbons & Trophies <span class="small">(upload as many as you like)</span></label>
    <p class="small" style="margin:2px 0 6px;">Upload photos of your ribbons, trophies, sashes, prize tack, or any awards from this show. Each gets a label.</p>
    <div id="cs_prize_area"></div>
    <button id="cs_add_prize" class="secondary" style="margin-top:6px;font-size:.85em;">➕ Add Prize / Ribbon</button>

    <hr style="border:none;border-top:1px solid #4a392a;margin:14px 0;" />

    <button id="cs_go" style="width:100%;margin-top:4px;">✅ Save Show Record</button>
    <div id="cs_result"></div>
  `;
  wrap.appendChild(card);

  // Discipline → updates class placeholder
  card.querySelector('#cs_disc').onchange=()=>{
    const disc=card.querySelector('#cs_disc').value;
    card.querySelector('#cs_class').placeholder=`e.g. ${DISCIPLINES[disc]?.difficulties?.[0]||'Open'}`;
  };

  // Lit preview
  if(card.querySelector('#cs_lit')){
    card.querySelector('#cs_lit').oninput=()=>{
      const wc=parseInt(card.querySelector('#cs_lit').value)||0;
      const prev=card.querySelector('#cs_lit_preview');
      prev.textContent=wc===0?"":(wc<200?"⚠️ Min 200 words":`✅ +${calcLitExp(wc)} EXP`);
      prev.style.color=wc<200&&wc>0?"#c9a23a":"#7a9b6e";
    };
  }

  // Bonus pills
  const selectedBonuses=new Set();
  card.querySelectorAll('[data-bonus]').forEach(p=>p.onclick=()=>{
    const k=p.dataset.bonus;
    if(selectedBonuses.has(k)){selectedBonuses.delete(k);p.classList.remove('active');}
    else{selectedBonuses.add(k);p.classList.add('active');}
  });

  // Show art upload
  card.querySelector('#cs_art_file').onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{
      artImage=r.result;
      card.querySelector('#cs_art_preview').innerHTML=`<img src="${artImage}" style="max-height:120px;border-radius:6px;border:1px solid #4a392a;object-fit:contain;cursor:zoom-in;" onclick="openLightbox('${artImage}','Show Art')" />`;
    }; r.readAsDataURL(f);
  };

  // Prize upload area
  function refreshPrizeArea(){
    const area=card.querySelector('#cs_prize_area');
    area.innerHTML=prizeImages.length ? prizeImages.map((p,i)=>`
      <div style="display:flex;align-items:center;gap:8px;padding:8px;background:#15100c;border-radius:6px;margin-bottom:6px;">
        <img src="${p.dataUrl}" style="width:56px;height:56px;object-fit:cover;border-radius:5px;border:1px solid #4a392a;flex:none;" />
        <div style="flex:1;">
          <input data-prize-label="${i}" value="${p.label}" placeholder="e.g. 1st Place Ribbon, Championship Trophy, Prize Saddle Pad…"
            style="width:100%;padding:5px;background:#1b1410;border:1px solid #4a392a;color:#f1e6d8;border-radius:4px;box-sizing:border-box;" />
        </div>
        <button data-remove-prize="${i}" class="danger" style="font-size:.75em;padding:3px 8px;flex:none;">✕</button>
      </div>`).join("") : '<div class="small" style="color:#5a4a3a;padding:4px 0;">No prizes added yet.</div>';

    area.querySelectorAll('[data-prize-label]').forEach(inp=>{
      inp.oninput=()=>{ prizeImages[Number(inp.dataset.prizeLabel)].label=inp.value; };
    });
    area.querySelectorAll('[data-remove-prize]').forEach(b=>{
      b.onclick=()=>{ prizeImages.splice(Number(b.dataset.removePrize),1); refreshPrizeArea(); };
    });
  }
  refreshPrizeArea();

  card.querySelector('#cs_add_prize').onclick=()=>{
    const inp=document.createElement('input');
    inp.type='file'; inp.accept='image/*';
    inp.onchange=e=>{
      const f=e.target.files[0]; if(!f) return;
      const r=new FileReader(); r.onload=()=>{
        prizeImages.push({dataUrl:r.result, label:""});
        refreshPrizeArea();
      }; r.readAsDataURL(f);
    };
    inp.click();
  };

  // Save handler
  card.querySelector('#cs_go').onclick=()=>{
    const hId=card.querySelector('#cs_horse').value;
    const h=state.horses.find(x=>x.id===hId);
    const disc=card.querySelector('#cs_disc').value;
    const venue=card.querySelector('#cs_venue').value.trim();
    const date=card.querySelector('#cs_date').value.trim();
    const placement=Number(card.querySelector('#cs_place').value)||null;
    const className=card.querySelector('#cs_class').value.trim();
    const note=card.querySelector('#cs_note').value.trim();
    const artType=card.querySelector('#cs_art_type')?.value||"";
    const litWords=parseInt(card.querySelector('#cs_lit')?.value)||0;
    const link=card.querySelector('#cs_link')?.value.trim()||"";
    const res=card.querySelector('#cs_result');

    // EXP (only if art type selected)
    let expGain=0;
    const sources=[];
    if(artType && ART_EXP[artType]){
      expGain+=ART_EXP[artType]; sources.push(`${artType} (+${ART_EXP[artType]})`);
      const litExp=calcLitExp(litWords);
      if(litExp>0){expGain+=litExp; sources.push(`Lit ${litWords}w (+${litExp})`);}
      const placeExp={1:4,2:3,3:2}[placement]||1;
      if(placement){expGain+=placeExp; sources.push(`Placement (+${placeExp})`);}
      selectedBonuses.forEach(k=>{if(BONUS_EXP[k]){expGain+=BONUS_EXP[k]; sources.push(`${k} (+${BONUS_EXP[k]})`);}});
      h.exp+=expGain;
      checkLevelUp(h);
      if(disc && DISCIPLINES[disc]?.stats) DISCIPLINES[disc].stats.forEach(s=>h.stats[s]=(h.stats[s]||0)+1);
    }

    // Save art log entry if art was provided
    if(artImage && artType){
      const artEntry={day:state.log.length+1,type:"competition",label:`${disc}${venue?" — "+venue:""}`,
        placement,art:artType,lit:litWords?`${litWords} words`:null,
        bonuses:[...selectedBonuses],exp:expGain,link:link||null,image:artImage};
      h.artLog.unshift(artEntry);
      saveArtEntry(h, artEntry);
    }

    // Save comp history record
    if(!h.compHistory) h.compHistory=[];
    const rec={
      id:uid2(), discipline:disc, difficulty:className, venue, date,
      placement, note, image:artImage||null, link:link||null,
      prizes:[...prizeImages],
    };
    h.compHistory.unshift(rec);

    const placeLabel=placement?["1st","2nd","3rd","4th","5th","6th"][placement-1]||placement+"th":"Participant";
    addLog(`🏆 ${h.name} — ${disc}${venue?" at "+venue:""} · ${placeLabel}${expGain?` · +${expGain} EXP`:""}`);
    saveHorse(h);
    save();

    res.innerHTML=`<div class="result success">✅ Show logged!${expGain?` +${expGain} EXP (${sources.join(", ")})`:""} ${prizeImages.length?`🎀 ${prizeImages.length} prize(s) saved.`:""}</div>`;

    // Reset
    artImage=null; prizeImages.length=0;
    card.querySelector('#cs_art_preview').innerHTML='';
    card.querySelector('#cs_art_file').value='';
    ['#cs_venue','#cs_date','#cs_note','#cs_class','#cs_link'].forEach(s=>{ const el=card.querySelector(s); if(el)el.value=''; });
    card.querySelector('#cs_place').value='';
    if(card.querySelector('#cs_art_type')) card.querySelector('#cs_art_type').value='';
    if(card.querySelector('#cs_lit')){ card.querySelector('#cs_lit').value=''; card.querySelector('#cs_lit_preview').textContent=''; }
    selectedBonuses.clear();
    card.querySelectorAll('[data-bonus]').forEach(p=>p.classList.remove('active'));
    refreshPrizeArea();
  };

  return wrap;
}

function buildShowHistory(){
  const wrap=el('div');
  state.horses.forEach(h=>{
    const history=h.compHistory||[];
    if(!history.length) return;
    const trophies=history.filter(c=>c.placement>=1&&c.placement<=3);
    const card=el('div','card');

    // Ribbon wall — includes prize photos too
    const ribbonWallHtml=trophies.length?`
      <div style="margin-bottom:14px;">
        <div class="small" style="margin-bottom:6px;color:#b5a392;">🏆 Ribbon Wall</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${trophies.map(c=>{
            const icon=c.placement===1?"🥇":c.placement===2?"🥈":"🥉";
            const placeStr=["1st","2nd","3rd"][c.placement-1];
            const prizes=c.prizes||[];
            // Show main image if exists, otherwise first prize image, otherwise emoji
            const mainImg=c.image||( prizes[0]?.dataUrl||null);
            return `<div style="background:#15100c;border:1px solid #4a392a;border-radius:8px;padding:8px;text-align:center;min-width:80px;max-width:110px;">
              ${mainImg?`<img src="${mainImg}" style="width:70px;height:70px;object-fit:cover;border-radius:5px;display:block;margin:0 auto 4px;cursor:zoom-in;" onclick="openLightbox('${mainImg}','${c.discipline} — ${placeStr}')" />`:`<div style="font-size:2.2em;margin-bottom:4px;">${icon}</div>`}
              <div style="font-size:.78em;">${icon} ${placeStr}</div>
              <div style="font-size:.72em;opacity:.7;">${c.discipline}</div>
              ${c.venue?`<div style="font-size:.68em;opacity:.5;">${c.venue}</div>`:""}
              ${prizes.length>1?`<div style="font-size:.68em;color:#c98a3a;margin-top:2px;">+${prizes.length} prizes</div>`:""}
            </div>`;
          }).join("")}
        </div>
      </div>`:
      `<div class="small" style="color:#5a4a3a;margin-bottom:10px;">No top-3 placements yet.</div>`;

    card.innerHTML=`
      <h3>${h.name}
        <span class="tag">${history.length} shows</span>
        <span class="tag" style="background:rgba(201,138,58,.15);color:#c98a3a;border-color:#c98a3a;">${trophies.length} 🏅</span>
      </h3>
      ${ribbonWallHtml}
      <div class="small" style="margin-bottom:6px;color:#b5a392;">📋 Full Show History</div>
      <div class="artlog-panel" style="max-height:400px;">
        ${history.map(c=>{
          const pl=c.placement;
          const icon=pl===1?"🥇":pl===2?"🥈":pl===3?"🥉":pl?"🏅":"";
          const placeLabel=pl?["1st","2nd","3rd","4th","5th","6th"][pl-1]||pl+"th":"Participant";
          const prizes=c.prizes||[];
          return `<div class="artlog-entry">
            <div style="display:flex;gap:8px;align-items:flex-start;">
              ${c.image?`<img src="${c.image}" class="artlog-thumb" style="flex:none;cursor:zoom-in;" onclick="openLightbox('${c.image}','${c.discipline}')" />`:""}
              <div style="flex:1;">
                ${icon} <b>${c.discipline}</b>${c.difficulty?` — ${c.difficulty}`:""} <span class="tag">${placeLabel}</span>
                ${c.venue?`<div class="small">${c.venue}${c.date?` · ${c.date}`:""}</div>`:(c.date?`<div class="small">${c.date}</div>`:"")}
                ${c.note?`<div class="small" style="opacity:.8;">${c.note}</div>`:""}
                ${prizes.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">
                  ${prizes.map(p=>`<div style="text-align:center;">
                    <img src="${p.dataUrl}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;border:1px solid #4a392a;cursor:zoom-in;display:block;" onclick="openLightbox('${p.dataUrl}','${p.label||"Prize"}')" />
                    ${p.label?`<div style="font-size:.65em;opacity:.6;max-width:44px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.label}</div>`:""}
                  </div>`).join("")}
                </div>`:""}
                <button data-act="del-show" data-hid="${h.id}" data-cid="${c.id}" class="secondary" style="font-size:.7em;padding:2px 7px;margin-top:6px;">✕ Remove</button>
              </div>
            </div>
          </div>`;
        }).join("")}
      </div>
    `;
    wrap.appendChild(card);
  });

  if(!state.horses.some(h=>(h.compHistory||[]).length)){
    wrap.innerHTML='<div class="card small">No shows logged yet — use Log a Show to add your first record.</div>';
  }

  wrap.querySelectorAll('[data-act="del-show"]').forEach(b=>b.onclick=()=>{
    if(!confirm('Remove this show record?')) return;
    const h=state.horses.find(x=>x.id===b.dataset.hid);
    if(h){ h.compHistory=(h.compHistory||[]).filter(c=>c.id!==b.dataset.cid); saveHorse(h); save(); render(); }
  });

  return wrap;
}


function renderArtLog(){
  const wrap=el('div');
  if(!state.horses.length){ wrap.innerHTML='<div class="card small">Add a horse first.</div>'; return wrap; }

  state.horses.forEach(h=>{
    if(!h.artLog.length) return;
    const card=el('div','card');
    card.innerHTML=`<h3>${h.name} <span class="tag">Lvl ${h.level}</span> <span class="tag">${h.artLog.length} entries</span></h3>
    <div class="artlog-panel" style="max-height:400px;">
      ${h.artLog.map(e=>{
        const placeLabel=e.placement?["🥇","🥈","🥉","4th","5th","6th"][e.placement-1]||"":null;
        return `<div class="artlog-entry">
          <div style="display:flex;gap:10px;align-items:flex-start;">
            ${e.image?`<img src="${e.image}" class="artlog-thumb" style="flex:none;" />`:""}
            <div style="flex:1;">
              <b>${e.label}</b>
              ${placeLabel?`<span class="tag">${placeLabel}</span>`:""}
              <span class="tag" style="background:rgba(122,155,110,.15);color:#7a9b6e;border-color:#7a9b6e;">+${e.exp} EXP</span>
              ${e.link?`<a href="${e.link}" target="_blank" class="artlog-link" style="font-size:.8em;margin-left:4px;">🔗</a>`:""}
              <div class="small" style="margin-top:2px;">${[e.art,e.lit,...(e.bonuses||[])].filter(Boolean).join(" · ")}</div>
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>`;
    wrap.appendChild(card);
  });

  if(!state.horses.some(h=>h.artLog.length)){
    wrap.innerHTML='<div class="card small">No art logged yet — use the Training or Competitions tabs to add entries.</div>';
  }

  wrap.querySelectorAll('[data-lightbox]').forEach(img=>{
    img.onclick=e=>{ e.stopPropagation(); openLightbox(img.dataset.lightbox, img.dataset.caption); };
  });

  return wrap;
}
