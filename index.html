// ============================================
// PASTED-LINK IMAGE PREVIEWS
// ============================================
// Show art, prize/ribbon photos, and art log images are entered as a pasted
// direct link instead of an upload (see the note at the top of the app) —
// this sidesteps the Google Sheets cell-size limit and GET/JSONP request
// size limit entirely, since a URL is just a short string. These helpers
// give a live preview and a clear fallback if someone pastes the artwork's
// page link instead of the actual image file link.

// FIX: horse names, venues, and prize labels are free text and can contain
// apostrophes (e.g. "D'Artagnan", "Judge's Choice", "St. Mary's Fairgrounds").
// Several onclick="openLightbox('...','...')" strings interpolated this text
// directly into a single-quoted JS argument with no escaping — an apostrophe
// there breaks out of the string early, corrupting the surrounding HTML and
// (since these live inside one big innerHTML template) can take the rest of
// that render pass down with it, leaving buttons unclickable. jsStr() makes
// text safe to drop into a single-quoted onclick argument; escAttr() makes
// text safe to drop into a double-quoted HTML attribute like title="...".
function jsStr(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function escAttr(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function imgUrlLoadError(img){

}

}

// Downscale + compress an uploaded image file before turning it into a
// base64 data URL. Uploads are synced to Google Sheets over a JSONP GET
// request, which puts the whole image in a URL query string — full-size
// phone photos (often 1-5MB) blow past the URL length limit and the sync
// silently fails, so the image looks fine locally but never actually saves.
// Keeping images small and compressed keeps them reliably under that limit.
//
// EVERY image upload in this app (profile photo, reference sheet, training
// art, competition art, prize/ribbon photos, tack images) MUST go through
// this before being stored, or it will silently fail to persist.
// FIX: this used one fixed quality/dimension for every image. That's fine
// for simple photos, but a busy/detailed reference sheet can still encode
// to well over Google Sheets' 50,000-character-per-cell limit even at
// 900px/.75 quality — and every image eventually gets reassembled into a
// single HorseImages cell server-side, so anything over that limit fails
// to save with no obvious reason why. Now it renders once, and if the
// result is still too big, keeps stepping quality down and then dimensions
// down until it comfortably fits (or hits a sane floor).
function resizeImageFile(file, maxDim=900, quality=0.75, opts={}){
  const maxChars   = opts.maxChars   || 45000; // margin below the 50k cell cap
  const minDim     = opts.minDim     || 250;
  const minQuality = opts.minQuality || 0.35;

  function renderAt(dim, q){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onerror = ()=>reject(new Error('Could not read file.'));
      reader.onload = ()=>{
        const img = new Image();
        img.onerror = ()=>reject(new Error('Could not decode image.'));
        img.onload = ()=>{
          let {width,height} = img;
          if(width>dim || height>dim){
            if(width>=height){ height=Math.round(height*(dim/width)); width=dim; }
            else { width=Math.round(width*(dim/height)); height=dim; }
          }
          const canvas=document.createElement('canvas');
          canvas.width=width; canvas.height=height;
          canvas.getContext('2d').drawImage(img,0,0,width,height);
          resolve(canvas.toDataURL('image/jpeg', q));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  return (async ()=>{
    let dim=maxDim, q=quality;
    let dataUrl = await renderAt(dim, q);
    let attempts=0;
    while(dataUrl.length > maxChars && attempts < 12){
      if(q > minQuality) q = Math.max(minQuality, +(q-0.1).toFixed(2));
      else if(dim > minDim) dim = Math.max(minDim, Math.round(dim*0.85));
      else break;
      dataUrl = await renderAt(dim, q);
      attempts++;
    }
    return dataUrl;
  })();
}

// ============================================
// GOOGLE SHEETS BACKEND
// ============================================

function stableGas(payload, urlOverride){
  return new Promise(resolve=>{
    const targetUrl = urlOverride || STABLE_URL;
    if(!targetUrl){ resolve({success:false,error:'No Stable Data URL configured.'}); return; }
    const cb='sCb_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    const url=targetUrl+'?callback='+cb+'&data='+encodeURIComponent(JSON.stringify(payload));
    const s=document.createElement('script');
    let done=false;
    // FIX: every failure (network error, timeout, or the backend genuinely
    // responding with success:false) used to just resolve silently — the
    // caller saw a boolean and the actual reason was thrown away. Now it's
    // logged to the console, tagged by action, so a failed save can
    // actually be diagnosed instead of guessed at.
    const finish=(data)=>{
      if(!data || data.success===false){
        console.error('[EquiStories save failed]', payload.action, '—', data?.error || 'no response (network/CORS/timeout)', {payload, response:data, requestUrlLength:url.length});
      }
      resolve(data);
    };
    window[cb]=(data)=>{ done=true; delete window[cb]; try{document.head.removeChild(s);}catch(e){} finish(data); };
    s.onerror=()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} console.error('[EquiStories save failed]', payload.action, '— Network error — request URL length:', url.length); finish({success:false,error:'Network error'});} };
    setTimeout(()=>{ if(!done){done=true;delete window[cb];try{document.head.removeChild(s);}catch(e){} console.error('[EquiStories save failed]', payload.action, '— Timed out — request URL length:', url.length); finish({success:false,error:'Timed out'});} },15000);
    s.src=url; document.head.appendChild(s);
  });
}

const IMAGE_CHUNK_SIZE = 3000;
async function saveHorseImageChunked(userId, horseId, imageKey, imageData){
  const totalChunks = Math.ceil(imageData.length / IMAGE_CHUNK_SIZE) || 1;
  for(let i=0;i<totalChunks;i++){
    const chunk = imageData.slice(i*IMAGE_CHUNK_SIZE, (i+1)*IMAGE_CHUNK_SIZE);
    const res = await stableGas({ action:'saveHorseImageChunk', userId, horseId, imageKey,
      chunk, chunkIndex:i, totalChunks });
    if(!res?.success) return false;
  }
  return true;
}

// FIX: saveHorse/saveStableState used to send the horse's (or the whole
// stable log's) entire JSON as one GET/JSONP request. That request is
// carried in the URL, and once a horse builds up enough competition
// history, breeding records, etc., the URL crosses a length ceiling
// specific to Google Apps Script's web app endpoint (roughly 6-8k
// characters) and the request fails outright with a network error —
// even though the same data would be totally fine written to the sheet.
// This mirrors the same chunking trick already used for images: split the
// JSON text into small pieces, send them one at a time, and let the
// backend (saveTextChunk) stitch them back together once the last one
// arrives. No single request is ever big enough to hit the ceiling.
const TEXT_CHUNK_SIZE = 3000;
async function sendTextChunked(userId, scope, refId, text){
  const totalChunks = Math.ceil(text.length / TEXT_CHUNK_SIZE) || 1;
  for(let i=0;i<totalChunks;i++){
    const chunk = text.slice(i*TEXT_CHUNK_SIZE, (i+1)*TEXT_CHUNK_SIZE);
    const res = await stableGas({ action:'saveTextChunk', userId, scope, refId,
      chunk, chunkIndex:i, totalChunks });
    if(!res?.success) return false;
  }
  return true;
}

// HISTORY: profileImage/referenceImage were the only fields that ever got
// chunked before saving — everything else (show art in compHistory, prize/
// ribbon photos, art log entry images) rode along as raw base64 inside the
// same GET/JSONP request as the rest of the horse or entry data, which
// caused failures/hangs once real photos were attached. That was briefly
// fixed by chunk-uploading those too (keyed placeholders, resolved back on
// load) — but since Google Sheets' 50,000-char cell limit still applied
// once reassembled, and a show's worth of prize photos meant many
// sequential uploads, that approach kept hitting new walls. Show art,
// prizes, and art log images are now pasted links instead (see the note at
// the top of the app) — sidestepping both problems, since a URL never
// needs chunking or hits any size limit.

// resolveImageRefs() is kept for backward compatibility: it still resolves
// any older @img:-placeholder records saved during the brief window when
// show/prize/art images were chunk-uploaded, before switching to pasted
// links. Nothing new gets saved in that placeholder format going forward.

function resolveImageRefs(horse){
  if(!horse) return;
  const usedKeys=new Set();
  (horse.artLog||[]).forEach(e=>{
    if(typeof e.image==='string' && e.image.startsWith('@img:')){
      const key=e.image.slice(5);
      e.image = horse[key] || null;
      // FIX: without this, every image freshly pulled back from the sheet
      // looked identical (to saveHorse/saveArtEntry) to a brand-new,
      // never-uploaded image — because it's still real base64 data, not a
      // placeholder. That meant the very next save re-uploaded this and
      // every other already-stored photo all over again, one chunked
      // request at a time, which for a stable with any real show history
      // could take long enough to look like the Save button did nothing.
      // Since we just pulled this out of storage, it's already there.
      e._imgUploaded = true;
      usedKeys.add(key);
    }
  });
  (horse.compHistory||[]).forEach(r=>{
    if(typeof r.image==='string' && r.image.startsWith('@img:')){
      const key=r.image.slice(5);
      r.image = horse[key] || null;
      r._imgUploaded = true;
      usedKeys.add(key);
    }
    (r.prizes||[]).forEach((p,i)=>{
      if(p && typeof p.dataUrl==='string' && p.dataUrl.startsWith('@img:')){
        const key=p.dataUrl.slice(5);
        p.dataUrl = horse[key] || null;
        if(!r._prizeUploaded) r._prizeUploaded={};
        r._prizeUploaded[i] = true;
        usedKeys.add(key);
      }
    });
  });
  usedKeys.forEach(k=>{ delete horse[k]; });
}

async function saveHorse(horse){
  if(!bankAccount.linked || !STABLE_URL) return false;
  const {artLog,...horseData}=horse;
  let allOk = true;
  // FIX: this used to also chunk-upload every show's art photo and every
  // prize photo (see the comment history above/in saveArtEntry) — that was
  // needed when those were uploaded files. Now that show art, prizes, and
  // art log images are pasted links (see the note at the top of the app),
  // they're just short strings and need no special handling at all — only
  // the one-per-horse profile picture and reference sheet still go through
  // chunked upload, since those remain regular file uploads.
  const IMAGE_KEYS = ['profileImage','referenceImage'];
  for(const key of IMAGE_KEYS){
    if(horseData[key] && horseData[key].startsWith('data:')){
      const ok = await saveHorseImageChunked(bankAccount.userId, horse.id, key, horseData[key]);
      if(!ok) allOk = false;
    }
  }
  // Strip any leftover bookkeeping flags from the now-retired chunked-image
  // scheme (harmless if absent) so they don't clutter the saved JSON.
  if(Array.isArray(horseData.compHistory)){
    horseData.compHistory = horseData.compHistory.map(rec=>{
      const clean={...rec};
      delete clean._imgUploaded; delete clean._prizeUploaded;
      return clean;
    });
  }
  const ok = await sendTextChunked(bankAccount.userId, 'horseJson', horse.id, JSON.stringify(horseData));
  if(!ok) allOk = false;
  return allOk;
}

async function saveArtEntry(horse, entry){
  if(!bankAccount.linked || !STABLE_URL) return false;
  // FIX: art log images are pasted links now (see the note at the top of
  // the app), not uploaded files, so there's nothing to chunk-upload here
  // anymore — just strip any leftover flag from the old scheme and send.
  const wireEntry = {...entry};
  delete wireEntry._imgUploaded;
  const res = await stableGas({ action:'saveArtLogEntry', userId:bankAccount.userId, horseId:horse.id, entryJson:JSON.stringify(wireEntry) });
  return !!res?.success;
}

async function deleteHorseFromSheets(horseId){

  await stableGas({ action:'deleteHorse', userId:bankAccount.userId, horseId });
}

async function loadFromSheets(){
  const userId = bankAccount.userId;
  const [stateRes, horsesRes] = await Promise.all([
    stableGas({ action:'loadStableState', userId }),
    stableGas({ action:'loadStable', userId }),
  ]);
  if(stateRes?.success && stateRes.data){
    state.log           = stateRes.data.log || [];
    state.tackInventory = stateRes.data.tackInventory || [];
  } else {
    state.log=[]; state.tackInventory=[];
  }
  state.horses = horsesRes?.success ? (horsesRes.data||[]) : [];
  state.horses.forEach(h=>{
    resolveImageRefs(h);
    if(h.referenceImage && h.refBonusGiven===undefined) h.refBonusGiven=true;
    if(!Array.isArray(h.completedMilestones)) h.completedMilestones=[];
    if(!Array.isArray(h.badges)) h.badges=[];
    if(h.level>=5 && !h.badges.includes("Quality Stock")) h.badges.push("Quality Stock");
    if(h.level>=10 && !h.badges.includes("Excellent Stock")) h.badges.push("Excellent Stock");
  });
  state.loaded = true;
}

async function loadPublicHorse(horseId, urlOverride){
  // Return the full response instead of null — collapsing every failure
  // mode (no URL, network error, timeout, or the backend genuinely
  // returning success:false) into the same null made it impossible to
  // tell "the link is broken" apart from "the backend can't find this
  // horse" apart from "the request never reached the server at all".
  const res = await stableGas({ action:'loadPublicHorse', horseId }, urlOverride);
  return res;
}

    await loadFromSheets();
  } else {
    state.horses=[]; state.log=[]; state.tackInventory=[];
    state.loaded=true;
  }

}

const BASE_STAT_VALUE = 10;
const BASE_BREEDING_SLOTS = 2;

function newHorse(data){
  const stats={};
  STATS.forEach(s=>stats[s]=BASE_STAT_VALUE);
  const age = Number(data.age)||3;
  return {
    id:uid(), name:data.name, breed:data.breed||"Unspecified", age,
    stage: age<1?"foal":age<2?"yearling":age<3?"two-year-old":"adult",
    level:1, exp:0, stats,
    breedingSlots:BASE_BREEDING_SLOTS, breedingFilled:0,
    profileImage:null, referenceImage:null, referenceLink:null, refBonusGiven:false,
    artLog:[], completedMilestones:[], badges:[],
    gender:data.gender||"", phenotype:data.phenotype||"", genotype:data.genotype||"",
    pedigree: data.pedigree || {},
    sireId:null, sireName:"", sireOwner:"", damId:null, damName:"", damOwner:"",
    tackOwned:[], tackEquipped:[],
    breedingRecords:[],
    compHistory:[],
    ownerName: data.ownerName||"",
    ownerLink: data.ownerLink||"",
    riderName: data.riderName||"",
    stableName: data.stableName||"",
    stableLink: data.stableLink||"",
    personality: data.personality||"",
    horseHistory: data.horseHistory||"",
    genoBasePrice: data.genoBasePrice||0,
    genoModifiers: data.genoModifiers||[],
    customNetWorth: data.customNetWorth||null,
  };
}

function uid2(){ return 't_'+Math.random().toString(36).slice(2,9); }

function getEquippedStatBonus(h, stat){
  let bonus=0;
  (h.tackEquipped||[]).forEach(tid=>{
    const item=(h.tackOwned||[]).find(t=>t.id===tid);
    if(item && item.stats && item.stats[stat]) bonus += Number(item.stats[stat])||0;
  });
  return bonus;
}

function getEffectiveStat(h, stat){
  return (h.stats[stat]||0) + getEquippedStatBonus(h, stat);
}

function applyLevelsFromExp(h, silent){
  while(h.level<10 && h.exp>=LEVEL_TABLE[h.level+1].exp){
    h.level++;
    const t=LEVEL_TABLE[h.level];
    STATS.forEach(s=>h.stats[s]+=t.bonus);
    h.breedingSlots+=t.slots;
    if(!silent) addLog(`🎉 ${h.name} reached Level ${h.level}! +${t.bonus} to all stats.`);
    if(t.badge){
      if(!Array.isArray(h.badges)) h.badges=[];
      if(!h.badges.includes(t.badge)) h.badges.push(t.badge);
      if(!silent) addLog(`🏆 ${h.name} earned the ${t.badge} trophy!`);
    }
  }
}
function checkLevelUp(h){ applyLevelsFromExp(h, false); }

function recomputeHorse(h){
  const baseStats={}; STATS.forEach(s=>baseStats[s]=BASE_STAT_VALUE);
  h.stats = baseStats;
  h.level = 1;
  h.breedingSlots = BASE_BREEDING_SLOTS + (h.breedingFilled||0)*0;
  h.badges = [];
  h.completedMilestones = [];
  h.exp = 0;

  const chronological = [...(h.artLog||[])].reverse();
  chronological.forEach(entry=>{
    h.exp += entry.exp||0;
    if(entry.statsDelta) Object.entries(entry.statsDelta).forEach(([s,v])=>{ h.stats[s]=(h.stats[s]||0)+v; });
    if(entry.milestoneIds) entry.milestoneIds.forEach(id=>{ if(!h.completedMilestones.includes(id)) h.completedMilestones.push(id); });
  });
  applyLevelsFromExp(h, true);
}

function deleteArtLogEntry(h, entryId){
  const idx=(h.artLog||[]).findIndex(e=>e.id===entryId);
  if(idx===-1) return;
  h.artLog.splice(idx,1);
  if(h.compHistory) h.compHistory = h.compHistory.filter(r=>r.artLogId!==entryId);
  recomputeHorse(h);
  addLog(`🗑️ Deleted a log entry for ${h.name} — EXP/stats reversed.`);
  saveHorse(h); save(); render();
}

function deleteCompRecord(h, recId){
  const rec=(h.compHistory||[]).find(r=>r.id===recId);
  if(!rec) return;
  h.compHistory = h.compHistory.filter(r=>r.id!==recId);
  if(rec.artLogId) h.artLog = (h.artLog||[]).filter(e=>e.id!==rec.artLogId);
  recomputeHorse(h);
  addLog(`🗑️ Deleted a show record for ${h.name} — EXP/stats reversed.`);
  saveHorse(h); save(); render();
}

function render(){
  const app = document.getElementById('app');
  if(!state.loaded){ app.innerHTML='<div style="padding:30px;color:#b5a392;">Loading…</div>'; return; }

  const params = new URLSearchParams(window.location.search);
  const profileId = params.get('horse');
  if(profileId){
    const localHorse = state.horses.find(x=>x.id===profileId);
    if(localHorse){ renderHorseProfilePage(app, localHorse); return; }
    app.innerHTML='<div style="padding:40px;text-align:center;color:#b5a392;font-family:Georgia,serif;">🐴 Loading horse profile…</div>';
    // FIX: STABLE_URL only ever exists in the browser localStorage of
    // whoever set it up in Admin settings. A visitor opening someone
    // else's shared profile link has never done that, so STABLE_URL was
    // blank for them and the fetch never even ran — it just immediately
    // said "not found". The share link now carries the Stable Data URL
    // as a `stable` query param, so we can use it here even if this
    // visitor has none configured locally. If they don't already have
    // one set, adopt it for the rest of this session too (not persisted,
    // so it won't override anything they configure themselves later).
    const stableOverride = params.get('stable');
    if(stableOverride && !STABLE_URL) STABLE_URL = stableOverride;
    loadPublicHorse(profileId, stableOverride).then(res=>{
      if(res?.success && res.data){ resolveImageRefs(res.data); renderHorseProfilePage(app, res.data); return; }
      // Diagnostic detail so we can tell apart: link missing the stable
      // param entirely, request never reaching the server (network/CORS/
      // timeout), vs. the Google Apps Script backend itself responding
      // with success:false (e.g. its loadPublicHorse action doesn't
      // exist, or genuinely can't find a horse with this id).
      let reason;
      if(!stableOverride && !STABLE_URL){
        reason = 'This link is missing the Stable Data URL (older link, generated before this was fixed). Re-copy the "Shareable link" from the horse\'s profile page and send that one instead.';
      } else if(!res){
        reason = 'No response at all from the Stable Data server — check the URL is correct and the Apps Script is deployed with "Anyone" access.';
      } else if(res.error){
        reason = `Server said: "${res.error}"`;
      } else {
        reason = 'The server responded, but did not return this horse. Check that your Apps Script\'s "loadPublicHorse" action exists and looks up horses by id across all users, not just the current one.';
      }
      app.innerHTML=`<div style="padding:40px;text-align:center;color:#b5a392;font-family:Georgia,serif;max-width:500px;margin:0 auto;">
        🐴 Horse not found.<br>
        <div style="font-size:.8em;opacity:.8;margin-top:10px;background:#15100c;border:1px solid #4a392a;border-radius:6px;padding:10px;">${reason}</div>
        <br><a href="${window.location.pathname}" style="color:#c98a3a;">← Back</a>
      </div>`;
    });
    return;
  }

  if(!bankAccount.linked){
    renderLoginScreen(app);
    return;
  }

  app.innerHTML=`
    <h1>🐴 EquiStories Art Tracker</h1>
    <details ${imageLinkHelpOpen?"open":""} id="imgHelpBox" style="background:#241a14;border:1px solid #4a392a;border-radius:8px;padding:10px 14px;margin-bottom:14px;">
      <summary style="cursor:pointer;color:#c98a3a;font-weight:bold;">📎 How to add show art, prize photos & art log images (click to expand)</summary>
      <div class="small" style="margin-top:10px;line-height:1.5;color:#d8c8b8;">
        Show art, prize/ribbon photos, and art log images are added by <b>pasting a direct link to the image</b> — not by uploading a file. (Profile pictures and reference sheets are still regular uploads, that hasn't changed.)
        <br><br>
        <b>The link has to point straight at the image file itself, not the page it's posted on.</b> A page link like <code>deviantart.com/user/art/Title-12345</code> won't preview or save correctly — you need the actual image address, which usually ends in <code>.jpg</code>, <code>.png</code>, or <code>.gif</code>.
        <br><br>
        <b>DeviantArt:</b> open the full-size image, right-click it, choose "Copy Image Address."<br>
        <b>Toyhouse:</b> click through to the full-size image (not the thumbnail), then right-click → "Copy Image Address."<br>
        <b>Tumblr, Bluesky, Twitter/X, Imgur, your own site, etc.:</b> same idea — right-click the actual picture and copy its image address, not the page URL.
        <br><br>
        Paste that link into the image field and it'll preview right there. If you see a "⚠️ couldn't load this image" message instead of your art, you likely copied the page link by mistake — go back and copy the image address specifically.
      </div>
    </details>
    <div class="tabs" style="align-items:center;">
      ${["roster","train","compete","tack"].map(t=>`
        <div class="tab${activeTab===t?' active':''}" data-tab="${t}">
          ${t==="roster"?"Stable Roster":t==="train"?"Training":t==="compete"?"Competitions":"🏇 Tack Inventory"}
        </div>`).join("")}
      <div style="flex:1;"></div>
      <span class="small" style="color:var(--dim);margin-right:6px;">👤 ${bankAccount.userId}</span>
      <button id="btn_signout" class="secondary" style="font-size:.78em;padding:4px 10px;margin-top:0;">🔓 Sign Out</button>
    </div>
    <div id="tab-content"></div>
  `;

  const imgHelpBox=app.querySelector('#imgHelpBox');
  if(imgHelpBox) imgHelpBox.ontoggle=()=>{ imageLinkHelpOpen=imgHelpBox.open; };

  app.querySelectorAll('[data-tab]').forEach(b=>{
    b.onclick=()=>{ activeTab=b.dataset.tab; render(); };
  });
  const signOutBtn=app.querySelector('#btn_signout');
  if(signOutBtn) signOutBtn.onclick=async()=>{
    if(!confirm('Sign out? Your stable data is saved to Google Sheets — sign back in anytime.')) return;
    bankAccount={userId:'',password:'',linked:false};
    state.horses=[]; state.log=[]; state.tackInventory=[]; state.loaded=false;
    saveBankAccount();
    load();
  };

  const content = app.querySelector('#tab-content');
  if(activeTab==="roster")   content.appendChild(renderRoster());
  else if(activeTab==="train")   content.appendChild(renderTraining());
  else if(activeTab==="compete") content.appendChild(renderCompete());
  else if(activeTab==="tack")    content.appendChild(renderTackInventory());
}

        <div style="margin-top:10px;">
          <p class="small">Paste the /exec URL from your deployed Stable Data Apps Script.</p>
          ${stableSet?'<div style="color:#7a9b6e;font-size:.82em;margin-bottom:6px;">✅ Stable URL is configured.</div>':'<div style="color:#b1473f;font-size:.82em;margin-bottom:6px;">⚠️ Not configured yet.</div>'}
          <input id="li_stable_url" placeholder="https://script.google.com/macros/s/…/exec" value="${STABLE_URL||''}" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;box-sizing:border-box;margin-bottom:6px;" />
          <div id="li_admin_lock" style="${stableSet?'':'display:none;'}">
            <input id="li_admin_pass" type="password" placeholder="Admin passcode" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;box-sizing:border-box;margin-bottom:6px;" />
          </div>
          <button id="li_save_url" style="width:100%;padding:8px;background:#2c2118;color:#f1e6d8;border:1px solid #4a392a;border-radius:5px;cursor:pointer;">💾 Save Stable URL</button>
          <div id="li_url_result" style="margin-top:4px;font-size:.82em;"></div>
        </div>
      </details>
    </div>
  `;

  app.querySelector('#li_go').onclick = async()=>{
    const userId=app.querySelector('#li_user').value.trim();
    const password=app.querySelector('#li_pass').value.trim();
    const res=app.querySelector('#li_result');
    if(!userId||!password){ res.innerHTML='<div style="color:#e08080;font-size:.85em;">Please enter both User ID and password.</div>'; return; }
    if(!STABLE_URL){ res.innerHTML='<div style="color:#e08080;font-size:.85em;">⚠️ Configure the Stable Data URL first (Admin section below).</div>'; return; }
    res.innerHTML='<div class="small">Signing in…</div>';
    const data=await gasPost({action:'loginPlayer',userId,password});
    if(data?.success){
      bankAccount={userId,password,linked:true};
      saveBankAccount();
      res.innerHTML='<div style="color:#7a9b6e;font-size:.85em;">✅ Welcome, '+data.data.displayName+'! Loading stable…</div>';
      await loadFromSheets();
      render();
    } else {
      res.innerHTML='<div style="color:#e08080;font-size:.85em;">❌ '+(data?.error||'Login failed — check your User ID and password.')+'</div>';
    }
  };
  app.querySelector('#li_pass').onkeydown=e=>{ if(e.key==='Enter') app.querySelector('#li_go').click(); };

  app.querySelector('#li_save_url').onclick=()=>{
    const url=app.querySelector('#li_stable_url').value.trim();
    const res=app.querySelector('#li_url_result');
    const adminInp=app.querySelector('#li_admin_pass');
    if(!url){ res.innerHTML='<span style="color:#e08080;">Please paste a URL first.</span>'; return; }
    if(!url.includes('script.google.com')){ res.innerHTML='<span style="color:#e08080;">That does not look like a Google Apps Script URL.</span>'; return; }
    if(STABLE_URL && adminInp){
      if(adminInp.value !== 'Eqistories123'){ res.innerHTML='<span style="color:#e08080;">Incorrect admin passcode.</span>'; return; }
    }
    STABLE_URL=url;
    localStorage.setItem('equi_stable_url',url);
    res.innerHTML='<span style="color:#7a9b6e;">✅ Saved!</span>';
    setTimeout(()=>renderLoginScreen(app), 800);
  };
}

function renderRoster(){
  const wrap = el('div');

  const form = el('div','card',`
    <h3>Add a Horse</h3>
    <div class="row">
      <div><label>Name</label><input id="nh_name" placeholder="e.g. Banshee" /></div>
      <div><label>Age</label><input id="nh_age" type="number" min="0" value="3" style="max-width:80px;" /></div>
      <div><label>Breed</label><input id="nh_breed" placeholder="e.g. Thoroughbred" /></div>
    </div>
    <div class="row" style="margin-top:8px;">
      <div><label>Gender <span class="small">(optional)</span></label>
        <select id="nh_gender">
          <option value="">— unset —</option>
          <option>Mare</option><option>Stallion</option><option>Gelding</option>
          <option>Filly</option><option>Colt</option><option>Rig</option>
        </select>
      </div>
    </div>
    <h4 style="margin:14px 0 4px;color:var(--accent);">🧬 Genetics</h4>
    <p class="small" style="margin:0 0 8px;">Pick alleles for each gene — the loci shown update based on Breed. This feeds directly into Net Worth.</p>
    <div id="nh_genetics_wrap"></div>
    <div id="nh_geno_preview" class="prompt-box" style="margin-top:8px;"></div>
    <button id="nh_add" style="margin-top:10px;">Add to Stable</button>
  `);
  wrap.appendChild(form);

  const genoSelections={extension:"EE", agouti:"AA"};
  function renderGeneticsPicker(){
    const breed=form.querySelector('#nh_breed').value;
    const loci=[GENETIC_LOCI.find(l=>l.key==="extension"), GENETIC_LOCI.find(l=>l.key==="agouti"),
      ...getAllowedLoci(breed).map(k=>GENETIC_LOCI.find(l=>l.key===k))].filter(Boolean);
    const wrapEl=form.querySelector('#nh_genetics_wrap');
    wrapEl.innerHTML=`<div class="row" style="flex-wrap:wrap;gap:8px;">
      ${loci.map(locus=>{
        if(locus.requiresAny){
          const satisfiesAll=Object.entries(locus.requiresAny).every(([reqKey,reqCodes])=>reqCodes.includes(genoSelections[reqKey]));
          if(!satisfiesAll) return "";
        }
        const current=genoSelections[locus.key]||locus.options[0].code;
        genoSelections[locus.key]=current;
        return `<div style="min-width:180px;"><label class="small">${locus.label}</label>
          <select data-locus="${locus.key}" style="width:100%;">
            ${locus.options.map(o=>`<option value="${o.code}" ${o.code===current?"selected":""}>${o.code} — ${o.desc}</option>`).join("")}
          </select>
        </div>`;
      }).join("")}
    </div>`;
    wrapEl.querySelectorAll('[data-locus]').forEach(sel=>sel.onchange=()=>{
      genoSelections[sel.dataset.locus]=sel.value;
      renderGeneticsPicker();
    });
    refreshGenoPreview();
  }
  function refreshGenoPreview(){
    const breed=form.querySelector('#nh_breed').value;
    const result=computeGenoResult(genoSelections, breed);
    form.querySelector('#nh_geno_preview').innerHTML=
      `<b>Phenotype:</b> ${result.phenotype}<br><b>Genotype:</b> ${result.genotype}<br><span class="small">Genetics value: ฿${result.totalPrice.toLocaleString()}</span>`;
  }
  renderGeneticsPicker();
  form.querySelector('#nh_breed').oninput=renderGeneticsPicker;
  form.querySelector('#nh_add').onclick=()=>{
    const name=form.querySelector('#nh_name').value.trim();
    const age=form.querySelector('#nh_age').value;
    const breed=form.querySelector('#nh_breed').value.trim()||"Unspecified";
    const gender=form.querySelector('#nh_gender').value;
    if(!name){alert("Give your horse a name first!"); return;}
    const geno=computeGenoResult(genoSelections, breed);
    const h=newHorse({name,age,breed,gender,phenotype:geno.phenotype,genotype:geno.genotype,
      genoBasePrice:geno.genoBasePrice, genoModifiers:geno.genoModifiers});
    state.horses.push(h);
    addLog(`🐎 ${h.name} (${breed}) joined the stable.`);
    save(); render();
  };

  state.horses.forEach(h=>{
    const open = expandedLogs.has(h.id);
    const pct = h.level>=10?100:Math.min(100,((h.exp-LEVEL_TABLE[h.level].exp)/(LEVEL_TABLE[h.level+1].exp-LEVEL_TABLE[h.level].exp))*100);
    const photoHtml = h.profileImage
      ? `<img src="${h.profileImage}" class="horse-photo" />`
      : `<div class="horse-photo-placeholder">🐴</div>`;
    const statBars = STATS.map(s=>{
      const base=h.stats[s]||0, bonus=getEquippedStatBonus(h,s);
      return `<div class="statbar-wrap">
        <span style="width:72px;font-size:.78em;">${STAT_LABELS[s]}</span>
        <div class="statbar-bg"><div class="statbar-fill" style="width:${Math.min(100,base+bonus)}%"></div></div>
        <span style="font-size:.75em;width:36px;text-align:right;">${base+bonus}${bonus?`<span style="color:var(--good);">+${bonus}</span>`:""}</span>
      </div>`;
    }).join("");

    let slots="";
    for(let i=0;i<h.breedingSlots;i++){
      const rec=(h.breedingRecords||[]).find(r=>r.slotIndex===i);
      slots+=`<div class="slot${rec?" filled":""}" data-act="slot-click" data-id="${h.id}" data-slot="${i}" style="cursor:pointer;" title="${rec?('Used — '+rec.partnerName):'Click to mark as used'}">${i+1}</div>`;
    }

    const artLogHtml = open ? `
      <div class="artlog-panel">
        ${h.artLog.length ? h.artLog.map(e=>`
          <div class="artlog-entry">
            ${e.image?`<img src="${e.image}" class="artlog-thumb" data-lightbox="${e.image}" data-caption="${e.label}" style="cursor:zoom-in;" />`:""}
            <b>${e.label}</b> ${e.type==="competition"&&e.placement?`<span class="tag">${["1st","2nd","3rd","4th","5th","6th"][e.placement-1]||e.placement+"th"}</span>`:""}
            <span class="tag">+${e.exp} EXP</span>
            <span data-act="delete-artlog" data-id="${h.id}" data-entry="${e.id}" style="cursor:pointer;color:#c96a3a;font-size:.85em;margin-left:6px;" title="Delete this entry (reverses its EXP/stats)">🗑️</span>
            ${e.link?`<a href="${e.link}" target="_blank" class="artlog-link" style="font-size:.8em;margin-left:6px;">🔗 View</a>`:""}
            <div class="small" style="margin-top:2px;">${e.art||""}${e.lit?` · ${e.lit}`:""}</div>
          </div>`).join("") : '<div class="small">No entries yet.</div>'}
      </div>` : "";

    const refHtml = h.referenceImage
      ? `<div style="margin-top:8px;">
          <div class="small" style="margin-bottom:3px;">📋 Reference Sheet ${h.referenceLink?`<a href="${h.referenceLink}" target="_blank" class="artlog-link">🔗 View</a>`:""}</div>
          <img src="${h.referenceImage}" style="max-width:100%;max-height:200px;border-radius:6px;border:1px solid #4a392a;object-fit:contain;" />
        </div>`
      : `<div class="small" style="margin-top:6px;color:#5a4a3a;">📋 No reference sheet uploaded.</div>`;

    const inv = state.tackInventory||[];
    const equippedHtml = (h.tackEquipped||[]).length
      ? (h.tackEquipped||[]).map(tid=>{
          const item=inv.find(t=>t.id===tid);
          if(!item) return "";
          const statsStr=Object.entries(item.stats||{}).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
          return `<span class="tag" style="background:#1a3a2a;color:#a0e8c0;border-color:#3a7a5a;">${item.name}${statsStr?` (${statsStr})`:""} <span data-act="unequip-tack" data-id="${h.id}" data-tack="${item.id}" style="cursor:pointer;">✕</span></span>`;
        }).join(" ")
      : `<span class="small">Nothing equipped.</span>`;
    const availableTack = inv.filter(t=>!(h.tackEquipped||[]).includes(t.id));

    const card = el('div','horse-card');
    card.innerHTML=`
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:none;">
          ${photoHtml}
          <input type="file" accept="image/*" data-photo-input="${h.id}" style="display:none;" />
          <button class="secondary" data-act="upload-photo" data-id="${h.id}" style="font-size:.72em;padding:3px 7px;margin-top:0;">📷</button>
        </div>
        <div style="flex:1;">
          <div style="display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;">
            <span data-act="view-profile" data-id="${h.id}" style="font-size:1.1em;color:var(--accent);font-weight:bold;text-decoration:none;cursor:pointer;">${h.name}</span>
            <span class="tag">Lvl ${h.level}</span>
            ${(h.badges||[]).map(b=>`<span class="tag" title="${b} Trophy" style="background:#3a2a10;color:#e8c86a;border-color:#c98a3a;">🏆 ${b}</span>`).join("")}
            <span data-act="view-profile" data-id="${h.id}" class="small" style="color:var(--accent);cursor:pointer;">🔗 Profile Page</span>
          </div>
          <div class="small">${h.breed} · Age ${h.age} (${h.stage})${h.gender?` · ${h.gender}`:""}</div>
          <div class="small">EXP: ${h.exp} / ${h.level<10?LEVEL_TABLE[h.level+1].exp:"MAX"}</div>
          <div class="expbar-bg"><div class="expbar-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="statgrid" style="margin-top:10px;">${statBars}</div>

      <div style="margin-top:8px;">
        <div class="small" style="margin-bottom:3px;">🏇 Equipped Tack:</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;">${equippedHtml}</div>
        ${availableTack.length ? `
          <select data-act="equip-select" data-id="${h.id}" style="margin-top:4px;width:auto;display:inline-block;font-size:.82em;">
            <option value="">+ Equip tack…</option>
            ${availableTack.map(t=>`<option value="${t.id}">${t.name} (${t.category})</option>`).join("")}
          </select>` : `<div class="small" style="margin-top:4px;">No more tack available — add some in the Tack Inventory tab.</div>`}
      </div>

      <div class="small" style="margin-top:8px;">Breeding Slots <span style="opacity:.7;">(click a slot to mark used)</span>:</div>
      <div class="breedslots">${slots||'<span class="small">none yet</span>'}</div>

      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
        <button class="secondary" data-act="toggle-log" data-id="${h.id}" style="font-size:.8em;padding:4px 10px;margin-top:0;">📖 ${open?"Hide":"Show"} Art Log (${h.artLog.length})</button>
        <button class="secondary" data-act="edit-lineage" data-id="${h.id}" style="font-size:.8em;padding:4px 10px;margin-top:0;">🧬 Lineage</button>
        <button class="secondary" data-act="edit-profile" data-id="${h.id}" style="font-size:.8em;padding:4px 10px;margin-top:0;">✏️ Edit Profile</button>
        <button class="secondary" data-act="edit-worth" data-id="${h.id}" style="font-size:.8em;padding:4px 10px;margin-top:0;">💰 Net Worth</button>
        <button class="secondary" data-act="upload-ref" data-id="${h.id}" style="font-size:.8em;padding:4px 10px;margin-top:0;">📋 ${h.referenceImage?"Change":"Upload"} Ref</button>
        <input type="file" accept="image/*" data-ref-input="${h.id}" style="display:none;" />
        <button class="danger" data-act="del" data-id="${h.id}" style="font-size:.8em;padding:4px 10px;margin-top:0;">Remove</button>
      </div>
      ${refHtml}
      ${artLogHtml}
    `;
    wrap.appendChild(card);
  });

  if(!state.horses.length) wrap.appendChild(el('div','small','<div style="padding:12px;color:#5a4a3a;">No horses yet — add one above!</div>'));

  wrap.querySelectorAll('[data-act="toggle-log"]').forEach(b=>b.onclick=()=>{
    if(expandedLogs.has(b.dataset.id)) expandedLogs.delete(b.dataset.id);
    else expandedLogs.add(b.dataset.id);
    render();
  });
  wrap.querySelectorAll('[data-act="del"]').forEach(b=>b.onclick=()=>{
    if(!confirm('Remove this horse? This cannot be undone.')) return;
    const delId=b.dataset.id;
    state.horses=state.horses.filter(x=>x.id!==delId);
    deleteHorseFromSheets(delId);
    save(); render();
  });
  wrap.querySelectorAll('[data-act="upload-photo"]').forEach(b=>b.onclick=()=>
    wrap.querySelector(`[data-photo-input="${b.dataset.id}"]`).click());
  wrap.querySelectorAll('[data-photo-input]').forEach(inp=>inp.onchange=async e=>{
    const f=e.target.files[0]; if(!f) return;
    const h=state.horses.find(x=>x.id===inp.dataset.photoInput);
    if(!h) return;
    try{
      h.profileImage = await resizeImageFile(f);
      render();
      const ok = await saveHorse(h);
      if(!ok) alert(`${h.name}'s photo was updated here, but saving it to the Stable Data sheet failed. Try again, or check your Stable Data URL in Admin settings.`);
    }catch(err){ alert('Could not process that image: '+err.message); }
  });
  wrap.querySelectorAll('[data-act="upload-ref"]').forEach(b=>b.onclick=()=>
    wrap.querySelector(`[data-ref-input="${b.dataset.id}"]`).click());
  wrap.querySelectorAll('[data-ref-input]').forEach(inp=>inp.onchange=async e=>{
    const f=e.target.files[0]; if(!f) return;
    const h=state.horses.find(x=>x.id===inp.dataset.refInput);
    if(!h) return;
    try{
      h.referenceImage = await resizeImageFile(f);
      let bonusMsg = "";
      if(!h.refBonusGiven){
        h.refBonusGiven = true;
        h.exp += REF_SHEET_EXP;
        checkLevelUp(h);
        addLog(`📋 ${h.name} — Reference sheet submitted · +${REF_SHEET_EXP} EXP`);
        bonusMsg = ` +${REF_SHEET_EXP} EXP awarded for first reference sheet submission!`;
      }
      render();
      const ok = await saveHorse(h);
      if(!ok) alert(`${h.name}'s reference sheet was updated here, but saving it to the Stable Data sheet failed. Try again, or check your Stable Data URL in Admin settings.`);
      else if(bonusMsg) alert(`📋 Reference sheet saved for ${h.name}.${bonusMsg}`);
    }catch(err){ alert('Could not process that image: '+err.message); }
  });
  wrap.querySelectorAll('[data-act="equip-select"]').forEach(sel=>sel.onchange=()=>{
    const h=state.horses.find(x=>x.id===sel.dataset.id);
    if(h && sel.value){
      h.tackEquipped=h.tackEquipped||[];
      h.tackEquipped.push(sel.value);
      save(); render();
    }
  });
  wrap.querySelectorAll('[data-act="unequip-tack"]').forEach(span=>span.onclick=()=>{
    const h=state.horses.find(x=>x.id===span.dataset.id);
    if(h){ h.tackEquipped=(h.tackEquipped||[]).filter(id=>id!==span.dataset.tack); save(); render(); }
  });
  wrap.querySelectorAll('[data-act="slot-click"]').forEach(slot=>slot.onclick=()=>{
    showBreedingSlotModal(slot.dataset.id, Number(slot.dataset.slot));
  });
  wrap.querySelectorAll('[data-act="edit-lineage"]').forEach(b=>b.onclick=()=>showLineageModal(b.dataset.id));
  wrap.querySelectorAll('[data-act="edit-profile"]').forEach(b=>b.onclick=()=>showProfileModal(b.dataset.id));
  wrap.querySelectorAll('[data-act="edit-worth"]').forEach(b=>b.onclick=()=>showNetWorthModal(b.dataset.id));
  wrap.querySelectorAll('[data-act="view-profile"]').forEach(b=>b.onclick=()=>goToProfile(b.dataset.id));
  wrap.querySelectorAll('[data-act="delete-artlog"]').forEach(b=>b.onclick=()=>{
    const h=state.horses.find(x=>x.id===b.dataset.id);
    if(!h) return;
    if(!confirm('Delete this log entry? This will reverse its EXP and stat gains.')) return;
    deleteArtLogEntry(h, b.dataset.entry);
  });

  return wrap;
}

// ============================================
// BREEDING SLOT MODAL
// ============================================

function showBreedingSlotModal(horseId, slotIndex){
  const h=state.horses.find(x=>x.id===horseId);
  if(!h) return;
  const existing=(h.breedingRecords||[]).find(r=>r.slotIndex===slotIndex);

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid #c98a3a;border-radius:10px;padding:24px;max-width:480px;width:100%;color:#f1e6d8;font-family:Georgia,serif;">
    <h3 style="margin-top:0;color:#c98a3a;">🐴 Breeding Slot ${slotIndex+1} — ${h.name}</h3>
    ${existing ? `
      <p style="color:#b5a392;">This slot is marked as used.</p>
      <div style="background:#15100c;padding:10px;border-radius:6px;margin-bottom:10px;">
        <b>${existing.role==="sire"?"Sired with":"Bred to"}:</b> ${existing.partnerName}${existing.partnerOwner?` (${existing.partnerOwner})`:""}<br>
        <b>Date:</b> ${existing.date||"—"}<br>
        ${existing.foalId ? `<b>Foal:</b> <span onclick="goToProfile('${existing.foalId}')" style="color:#c98a3a;cursor:pointer;text-decoration:underline;">${existing.foalName}</span>` : (existing.foalName?`<b>Foal:</b> ${existing.foalName} (not linked)`:'<b>Foal:</b> not yet born/added')}
        ${existing.note?`<br><i>${existing.note}</i>`:""}
      </div>
      ${!existing.foalId ? `
      <label style="font-size:.8em;color:#b5a392;text-transform:uppercase;">Link to Foal (if added to your roster)</label>
      <select id="bs_foal_select" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-top:4px;">
        <option value="">— select foal from roster —</option>
        ${state.horses.filter(x=>x.id!==h.id).map(x=>`<option value="${x.id}">${x.name}</option>`).join("")}
      </select>
      <button id="bs_link_foal" style="margin-top:8px;width:100%;background:#c98a3a;color:#241a14;border:none;padding:9px;border-radius:6px;font-weight:bold;cursor:pointer;">🔗 Link Foal</button>
      ` : ""}
      <button id="bs_clear" style="margin-top:10px;width:100%;background:#b1473f;color:#fff;border:none;padding:9px;border-radius:6px;font-weight:bold;cursor:pointer;">🗑️ Clear This Slot</button>
    ` : `
      <p style="color:#b5a392;">Mark this slot as used by recording the breeding pairing.</p>
      <label style="font-size:.8em;color:#b5a392;text-transform:uppercase;">This horse's role</label>
      <select id="bs_role" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-top:4px;">
        <option value="sire">Sire (this horse is the father)</option>
        <option value="dam">Dam (this horse is the mother)</option>
      </select>
      <label style="font-size:.8em;color:#b5a392;text-transform:uppercase;margin-top:8px;display:block;">Partner's Name</label>
      <input id="bs_partner_name" placeholder="e.g. Moonshadow" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-top:4px;" />
      <label style="font-size:.8em;color:#b5a392;text-transform:uppercase;margin-top:8px;display:block;">Partner's Owner <span style="opacity:.7;">(optional)</span></label>
      <input id="bs_partner_owner" placeholder="e.g. @username" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-top:4px;" />
      <label style="font-size:.8em;color:#b5a392;text-transform:uppercase;margin-top:8px;display:block;">Date</label>
      <input id="bs_date" placeholder="e.g. Day 45 or a real date" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-top:4px;" />
      <label style="font-size:.8em;color:#b5a392;text-transform:uppercase;margin-top:8px;display:block;">Note <span style="opacity:.7;">(optional)</span></label>
      <input id="bs_note" placeholder="Any notes about this breeding" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-top:4px;" />
      <button id="bs_save" style="margin-top:12px;width:100%;background:#c98a3a;color:#241a14;border:none;padding:9px;border-radius:6px;font-weight:bold;cursor:pointer;">✅ Mark Slot as Used</button>
    `}
    <button id="bs_cancel" style="margin-top:8px;width:100%;background:#2c2118;color:#f1e6d8;border:1px solid #4a392a;padding:9px;border-radius:6px;cursor:pointer;">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#bs_cancel').onclick=()=>overlay.remove();

  const saveBtn=overlay.querySelector('#bs_save');
  if(saveBtn) saveBtn.onclick=()=>{
    const role=overlay.querySelector('#bs_role').value;
    const partnerName=overlay.querySelector('#bs_partner_name').value.trim();
    const partnerOwner=overlay.querySelector('#bs_partner_owner').value.trim();
    const date=overlay.querySelector('#bs_date').value.trim();
    const note=overlay.querySelector('#bs_note').value.trim();
    if(!partnerName){ alert("Please enter the partner's name."); return; }
    if(!h.breedingRecords) h.breedingRecords=[];
    h.breedingRecords.push({ id:uid2(), slotIndex, role, partnerName, partnerOwner, date, note, foalId:null, foalName:"" });
    h.breedingFilled=(h.breedingFilled||0)+1;
    addLog(`🐴 ${h.name}'s breeding slot ${slotIndex+1} marked as used (${role==="sire"?"sired":"bred"} with ${partnerName}).`);
    save(); overlay.remove(); render();
  };

  const clearBtn=overlay.querySelector('#bs_clear');
  if(clearBtn) clearBtn.onclick=()=>{
    if(!confirm('Clear this breeding record? This cannot be undone.')) return;
    h.breedingRecords=(h.breedingRecords||[]).filter(r=>r.slotIndex!==slotIndex);
    save(); overlay.remove(); render();
  };

  const linkBtn=overlay.querySelector('#bs_link_foal');
  if(linkBtn) linkBtn.onclick=()=>{
    const foalId=overlay.querySelector('#bs_foal_select').value;
    if(!foalId){ alert("Please select a foal first."); return; }
    const foal=state.horses.find(x=>x.id===foalId);
    const rec=(h.breedingRecords||[]).find(r=>r.slotIndex===slotIndex);
    if(rec && foal){
      rec.foalId=foal.id; rec.foalName=foal.name;
      addLog(`🔗 Linked ${h.name}'s breeding record to foal ${foal.name}.`);
      save(); overlay.remove(); render();
    }
  };
}

const PED_SLOTS = [
  {key:"sire",  label:"Sire",  col:2, parent:null,   side:"top"},
  {key:"dam",   label:"Dam",   col:2, parent:null,   side:"bot"},
  {key:"ss",    label:"SS",    col:3, parent:"sire", side:"top"},
  {key:"sd",    label:"SD",    col:3, parent:"sire", side:"bot"},
  {key:"ds",    label:"DS",    col:3, parent:"dam",  side:"top"},
  {key:"dd",    label:"DD",    col:3, parent:"dam",  side:"bot"},
  {key:"sss",   label:"SSS",   col:4, parent:"ss",   side:"top"},
  {key:"ssd",   label:"SSD",   col:4, parent:"ss",   side:"bot"},
  {key:"sds",   label:"SDS",   col:4, parent:"sd",   side:"top"},
  {key:"sdd",   label:"SDD",   col:4, parent:"sd",   side:"bot"},
  {key:"dss",   label:"DSS",   col:4, parent:"ds",   side:"top"},
  {key:"dsd",   label:"DSD",   col:4, parent:"ds",   side:"bot"},
  {key:"dds",   label:"DDS",   col:4, parent:"dd",   side:"top"},
  {key:"ddd",   label:"DDD",   col:4, parent:"dd",   side:"bot"},
];

function pedEntry(h, key){
  return (h.pedigree || {})[key] || {name:"", link:"", inRosterId:""};
}

function pedLink(entry, label){
  const name = entry.name || "Unknown";
  const inRoster = entry.inRosterId ? state.horses.find(x=>x.id===entry.inRosterId) : null;
  if(inRoster && name !== "Unknown"){
    return `<span onclick="goToProfile('${inRoster.id}')" style="color:#c98a3a;text-decoration:underline;font-weight:bold;cursor:pointer;">${name}</span>`;
  }
  if(entry.link && name !== "Unknown"){
    return `<a href="${entry.link}" target="_blank" style="color:#c98a3a;text-decoration:none;font-weight:bold;">${name}</a>`;
  }
  return `<span style="color:${name==="Unknown"?"#4a392a":"#f1e6d8"};font-weight:${name!=="Unknown"?"bold":"normal"};">${name}</span>`;
}

function renderPedigreeChart(h){
  const p = h.pedigree || {};

  function row(key, label, indent){
    const e = pedEntry(h, key);
    const indentStyle = `padding-left:${indent}px;`;
    return `<div style="${indentStyle}font-size:.82em;padding:2px 0;display:flex;align-items:center;gap:6px;">
      <span style="color:#4a392a;min-width:32px;font-size:.9em;">${label}:</span>
      ${pedLink(e, label)}
    </div>`;
  }

  return `<div style="font-family:'Courier New',monospace;background:#15100c;border:1px solid #4a392a;border-radius:8px;padding:14px;line-height:1.8;">
    <div style="font-size:.78em;color:#b5a392;margin-bottom:8px;font-family:Georgia,serif;">Bloodline:</div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;">
      <div>
        <div style="font-size:.85em;padding:2px 0;"><b style="color:#c98a3a;">Sire:</b> ${pedLink(pedEntry(h,'sire'),'Sire')}</div>
        <div style="font-size:.85em;padding:2px 0;margin-top:4px;"><b style="color:#c98a3a;">Dam:</b> ${pedLink(pedEntry(h,'dam'),'Dam')}</div>
      </div>
    </div>

    <div style="margin-top:10px;border-left:2px solid #4a392a;padding-left:10px;">
      <div style="margin-bottom:2px;">${row('ss','SS',0)}</div>
      <div style="margin-bottom:8px;padding-left:20px;">
        ${row('sss','SSS',0)}
        ${row('ssd','SSD',0)}
      </div>
      <div style="margin-bottom:2px;">${row('sd','SD',0)}</div>
      <div style="margin-bottom:8px;padding-left:20px;">
        ${row('sds','SDS',0)}
        ${row('sdd','SDD',0)}
      </div>
    </div>

    <div style="margin-top:6px;border-left:2px solid #4a392a;padding-left:10px;">
      <div style="margin-bottom:2px;">${row('ds','DS',0)}</div>
      <div style="margin-bottom:8px;padding-left:20px;">
        ${row('dss','DSS',0)}
        ${row('dsd','DSD',0)}
      </div>
      <div style="margin-bottom:2px;">${row('dd','DD',0)}</div>
      <div style="padding-left:20px;">
        ${row('dds','DDS',0)}
        ${row('ddd','DDD',0)}
      </div>
    </div>
  </div>`;
}

        <label style="font-size:.72em;color:#b5a392;text-transform:uppercase;display:block;margin-top:6px;">External Link <span style="opacity:.6;">(off-site URL, optional)</span></label>
        <input data-ped="${key}" data-field="link" value="${e.link||''}" placeholder="https://… (DeviantArt, Toyhouse, etc.)" style="width:100%;padding:6px;background:#1b1410;border:1px solid #4a392a;color:#f1e6d8;border-radius:4px;margin-top:3px;box-sizing:border-box;" />
        <label style="font-size:.72em;color:#b5a392;text-transform:uppercase;display:block;margin-top:6px;">Link to horse in your roster <span style="opacity:.6;">(overrides external link)</span></label>
        <select data-ped="${key}" data-field="inRosterId" style="width:100%;padding:6px;background:#1b1410;border:1px solid #4a392a;color:#f1e6d8;border-radius:4px;margin-top:3px;box-sizing:border-box;">
          <option value="">— not in roster —</option>
          ${rosterOpts.replace(`value="${inRosterVal}"`, `value="${inRosterVal}" selected`)}
        </select>
      </div>`;
  }

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';
  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid #c98a3a;border-radius:10px;padding:24px;max-width:560px;width:100%;color:#f1e6d8;font-family:Georgia,serif;margin:auto;">
    <h3 style="margin-top:0;color:#c98a3a;">🧬 Pedigree Editor — ${h.name}</h3>
    <p style="color:#b5a392;font-size:.85em;margin-top:0;">Fill in up to 3 generations. Names can link to on-site horse profiles or external pages. Leave blank for Unknown.</p>

    <details open style="margin-bottom:8px;"><summary style="cursor:pointer;color:#c98a3a;font-weight:bold;padding:6px 0;">Generation 1 — Parents</summary>
      ${slotFields('sire','Sire (Father)')}
      ${slotFields('dam','Dam (Mother)')}
    </details>

    <details style="margin-bottom:8px;"><summary style="cursor:pointer;color:#c98a3a;font-weight:bold;padding:6px 0;">Generation 2 — Grandparents</summary>
      ${slotFields('ss','SS - Sires Sire')}
      ${slotFields('sd','SD - Sires Dam')}
      ${slotFields('ds','DS - Dams Sire')}
      ${slotFields('dd','DD - Dams Dam')}
    </details>

    <details style="margin-bottom:8px;"><summary style="cursor:pointer;color:#c98a3a;font-weight:bold;padding:6px 0;">Generation 3 — Great-Grandparents</summary>
      ${slotFields('sss','SSS')}${slotFields('ssd','SSD')}
      ${slotFields('sds','SDS')}${slotFields('sdd','SDD')}
      ${slotFields('dss','DSS')}${slotFields('dsd','DSD')}
      ${slotFields('dds','DDS')}${slotFields('ddd','DDD')}
    </details>

    <button id="ln_save" style="margin-top:10px;width:100%;background:#c98a3a;color:#241a14;border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:.95em;">💾 Save Pedigree</button>
    <button id="ln_cancel" style="margin-top:8px;width:100%;background:#2c2118;color:#f1e6d8;border:1px solid #4a392a;padding:10px;border-radius:6px;cursor:pointer;font-size:.95em;">Cancel</button>

  document.body.appendChild(overlay);

  overlay.querySelector('#ln_cancel').onclick=()=>overlay.remove();

      h.pedigree[key][field]=inp.value.trim();
    });
    h.sireId=h.pedigree.sire?.inRosterId||null;
    h.sireName=h.pedigree.sire?.name||"";
    h.damId=h.pedigree.dam?.inRosterId||null;

    addLog(`🧬 Updated pedigree for ${h.name}.`);
    save(); overlay.remove(); render();
  };
}

function renderTraining(){
  const wrap=el('div');
  if(!state.horses.length){ wrap.innerHTML='<div class="card small">Add a horse on the Stable Roster tab first.</div>'; return wrap; }

  let combinedMode=false;
  let selectedBonuses=new Set();
  let uploadedImage=null;

  function currentHorse(){ return state.horses.find(x=>x.id===card.querySelector('#tr_horse').value); }
  function buildTrainingOpts(h){ return trainingOptionsFor(h).map(t=>`<option value="${t.id}">${t.name}</option>`).join(""); }

  const card=el('div','card');
  card.innerHTML=`
    <h3>Log Training</h3>
    <div class="row">
      <div><label>Horse</label>
        <select id="tr_horse">${state.horses.map(h=>`<option value="${h.id}">${h.name} (${h.stage})</option>`).join("")}</select>
      </div>
      <div style="flex:none;">
        <label>Mode</label>
        <div class="pill-select" style="margin-top:4px;">
          <div class="pill active" id="tr_mode_single">Single</div>
          <div class="pill" id="tr_mode_combined">⚡ Combined</div>
        </div>
      </div>
    </div>
    <div class="row" style="margin-top:8px;">
      <div><label id="tr_lbl1">Training Type</label><select id="tr_type">${buildTrainingOpts(state.horses[0])}</select></div>
      <div id="tr_type2_wrap" style="display:none;"><label>Second Training</label><select id="tr_type2">${buildTrainingOpts(state.horses[0])}</select></div>
    </div>
    <div id="tr_milestone_status"></div>
    <div id="tr_prompt"></div>
    <div style="margin-top:12px;">
      <label>Art Image URL <span class="required">* Required</span></label>
      <p class="small" style="margin:2px 0 6px;">Paste a direct link to the artwork image (not the page it's posted on) — see the note at the top of the page for how to get one.</p>
      <input type="text" id="tr_image_url" placeholder="https://…jpg / .png / .gif" />
      <div id="tr_image_preview" style="margin-top:6px;"></div>
    </div>
    <div class="row" style="margin-top:10px;">
      <div>
        <label>Art Type <span class="required">* Required</span></label>
        <select id="tr_art">
          <option value="">— select art type —</option>
          ${Object.keys(ART_EXP).map(k=>`<option value="${k}">${k} (+${ART_EXP[k]} EXP)</option>`).join("")}
        </select>
      </div>
      <div>
        <label>Literature Word Count <span class="small">(optional)</span></label>
        <input type="number" id="tr_lit" min="0" placeholder="e.g. 350 — min 200 for EXP" />
        <div class="small" id="tr_lit_preview" style="margin-top:2px;"></div>
      </div>
    </div>
    <div style="margin-top:8px;">
      <label>Bonus Elements <span class="small">(optional)</span></label>
      <div class="pill-select" id="tr_bonuses">
        ${Object.keys(BONUS_EXP).map(k=>`<div class="pill" data-bonus="${k}">${k} (+${BONUS_EXP[k]})</div>`).join("")}
      </div>
    </div>
    <div style="margin-top:8px;"><label>Link to Art <span class="small">(optional)</span></label><input id="tr_link" placeholder="https://…" /></div>
    <button id="tr_go" style="margin-top:12px;">✅ Log Training</button>
    <div id="tr_result"></div>
  `;
  wrap.appendChild(card);

  function refreshPrompt(){
    const h=currentHorse();
    const opts=trainingOptionsFor(h);
    const t=opts.find(x=>x.id===card.querySelector('#tr_type').value);
    const t2=combinedMode?opts.find(x=>x.id===card.querySelector('#tr_type2').value):null;
    if(!t) return;
    const allStats={...t.stats};
    if(t2) Object.entries(t2.stats).forEach(([s,v])=>allStats[s]=(allStats[s]||0)+v);
    const statsStr=Object.entries(allStats).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
    card.querySelector('#tr_prompt').innerHTML=`<div class="prompt-box">
      ${t2?`⚡ <b>${t.name}</b> + <b>${t2.name}</b>`:`📝 <b>${t.name}</b>`}<br>
      <span style="font-size:.85em;">${t.prompt}${t2?`<br><span style="opacity:.8;">${t2.prompt}</span>`:""}</span><br>
      <span class="small">Stats: ${statsStr}</span>
    </div>`;
  }

  function refreshMilestoneStatus(){
    const h=currentHorse();
    const m=MILESTONES[h.stage];
    const box=card.querySelector('#tr_milestone_status');
    if(!m){ box.innerHTML=''; return; }
    const done=new Set(h.completedMilestones||[]);
    const doneCount=m.options.filter(o=>done.has(o.id)).length;
    const ready=doneCount>=m.required;
    box.innerHTML=`<div class="prompt-box" style="border-color:${ready?'#7a9b6e':'#4a392a'};">
      <b>${h.name}</b> is a <b>${h.stage}</b> — ${doneCount}/${m.required} age-up milestone${m.required>1?'s':''} completed
      ${ready?` · <button id="tr_ageup" style="margin-left:6px;">🎂 Age Up to ${m.next}</button>`:''}
    </div>`;
    const btn=box.querySelector('#tr_ageup');
    if(btn) btn.onclick=()=>{
      h.stage=m.next;
      addLog(`🎂 ${h.name} aged up to ${m.next}!`);
      saveHorse(h); save(); render();
    };
  }

  refreshPrompt();
  refreshMilestoneStatus();
  card.querySelector('#tr_type').onchange=refreshPrompt;
  card.querySelector('#tr_type2').onchange=refreshPrompt;
  card.querySelector('#tr_horse').onchange=()=>{
    const h=currentHorse();
    card.querySelector('#tr_type').innerHTML=buildTrainingOpts(h);
    card.querySelector('#tr_type2').innerHTML=buildTrainingOpts(h);
    refreshPrompt();
    refreshMilestoneStatus();
  };

  card.querySelector('#tr_mode_single').onclick=()=>{
    combinedMode=false;
    card.querySelector('#tr_mode_single').classList.add('active');
    card.querySelector('#tr_mode_combined').classList.remove('active');
    card.querySelector('#tr_type2_wrap').style.display='none';
    card.querySelector('#tr_lbl1').textContent='Training Type';
    refreshPrompt();
  };
  card.querySelector('#tr_mode_combined').onclick=()=>{
    combinedMode=true;
    card.querySelector('#tr_mode_combined').classList.add('active');
    card.querySelector('#tr_mode_single').classList.remove('active');
    card.querySelector('#tr_type2_wrap').style.display='';
    card.querySelector('#tr_lbl1').textContent='First Training';
    refreshPrompt();
  };

  card.querySelectorAll('[data-bonus]').forEach(p=>p.onclick=()=>{
    const k=p.dataset.bonus;
    if(selectedBonuses.has(k)){selectedBonuses.delete(k);p.classList.remove('active');}
    else{selectedBonuses.add(k);p.classList.add('active');}
  });

  card.querySelector('#tr_lit').oninput=()=>{
    const wc=parseInt(card.querySelector('#tr_lit').value)||0;
    const exp=calcLitExp(wc);
    const prev=card.querySelector('#tr_lit_preview');
    prev.textContent=wc===0?"":(wc<200?"⚠️ Min 200 words for EXP":`✅ +${exp} EXP`);
    prev.style.color=wc<200&&wc>0?"#c9a23a":"#7a9b6e";
  };

  // FIX (was the training-entry save bug): this used to read an uploaded
  // file and embed it as base64, which was either too large for the
  // GET/JSONP request or (after compression) still ate into the Sheets
  // cell-size limit. Art images are now pasted links instead — a URL is
  // just a short string, so there's nothing left to compress, chunk, or
  // fail to fit.
  card.querySelector('#tr_image_url').oninput=()=>{
    uploadedImage = card.querySelector('#tr_image_url').value.trim() || null;
  };
  card.querySelector('#tr_image_url').onblur=()=>{
    card.querySelector('#tr_image_preview').innerHTML = urlImagePreviewHTML(uploadedImage, 'Training Art');
  };

  card.querySelector('#tr_go').onclick=async()=>{
    const hId=card.querySelector('#tr_horse').value;
    const h=state.horses.find(x=>x.id===hId);
    const tId=card.querySelector('#tr_type').value;
    const tId2=combinedMode?card.querySelector('#tr_type2').value:null;
    const artType=card.querySelector('#tr_art').value;
    const litWords=parseInt(card.querySelector('#tr_lit').value)||0;
    const link=card.querySelector('#tr_link').value.trim();
    const res=card.querySelector('#tr_result');

    if(!uploadedImage){ res.innerHTML='<div class="result fail">🖼️ An image is required to log training.</div>'; return; }
    if(!artType){ res.innerHTML='<div class="result fail">Please select an art type.</div>'; return; }
    if(combinedMode && tId===tId2){ res.innerHTML='<div class="result fail">Please choose two different training types.</div>'; return; }

    const t=trainingOptionsFor(h).find(x=>x.id===tId);
    const t2=tId2?trainingOptionsFor(h).find(x=>x.id===tId2):null;
    const label=t2?`${t.name} + ${t2.name}`:t.name;
    const allStats={...t.stats};
    if(t2) Object.entries(t2.stats).forEach(([s,v])=>allStats[s]=(allStats[s]||0)+v);
    Object.entries(allStats).forEach(([s,v])=>h.stats[s]=(h.stats[s]||0)+v);

    const m=MILESTONES[h.stage];
    const milestoneIds=[];
    if(m){
      if(!Array.isArray(h.completedMilestones)) h.completedMilestones=[];
      [t,t2].filter(Boolean).forEach(tr=>{
        if(m.options.some(o=>o.id===tr.id)){
          milestoneIds.push(tr.id);
          if(!h.completedMilestones.includes(tr.id)) h.completedMilestones.push(tr.id);
        }
      });
    }

    let expGain=ART_EXP[artType]||0;
    const sources=[`${artType} (+${ART_EXP[artType]})`];
    const litExp=calcLitExp(litWords);
    if(litExp>0){expGain+=litExp; sources.push(`Lit ${litWords}w (+${litExp})`);}
    selectedBonuses.forEach(k=>{if(BONUS_EXP[k]){expGain+=BONUS_EXP[k]; sources.push(`${k} (+${BONUS_EXP[k]})`);}});
    h.exp+=expGain;
    checkLevelUp(h);

    const trainEntry={id:uid2(),day:state.log.length+1,type:"training",label,art:artType,lit:litWords?`${litWords} words`:null,bonuses:[...selectedBonuses],exp:expGain,link:link||null,image:uploadedImage,statsDelta:allStats,milestoneIds};
    h.artLog.unshift(trainEntry);
    const statsStr=Object.entries(allStats).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
    addLog(`🎨 ${h.name} — ${label} (${statsStr}) · +${expGain} EXP`);

    res.innerHTML=`<div class="result">⏳ Saving…</div>`;
    // FIX: previously these calls were fired without awaiting or checking
    // their result, so a failed save (still-too-large image, network
    // hiccup) gave no feedback at all — the entry just silently vanished
    // on reload with no error shown.
    const [hOk, entryOk] = await Promise.all([ saveHorse(h), saveArtEntry(h, trainEntry) ]);
    await save();

    if(hOk && entryOk){
      res.innerHTML=`<div class="result success">✅ Training logged & saved! ${statsStr} · +${expGain} EXP (${sources.join(", ")})</div>`;
    } else {
      res.innerHTML=`<div class="result fail">⚠️ Training was recorded here, but saving it to the Stable Data sheet failed. Try again, or check your Stable Data URL in Admin settings.</div>`;
    }

    uploadedImage=null;
    card.querySelector('#tr_image_preview').innerHTML='';
    card.querySelector('#tr_image_url').value='';
    card.querySelector('#tr_lit').value='';
    card.querySelector('#tr_lit_preview').textContent='';
    card.querySelector('#tr_link').value='';
    selectedBonuses.clear();
    card.querySelectorAll('[data-bonus]').forEach(p=>p.classList.remove('active'));
    refreshMilestoneStatus();
  };

  return wrap;
}

function renderCompete(){
  const wrap=el('div');
  if(!state.horses.length){ wrap.innerHTML='<div class="card small">Add a horse on the Stable Roster tab first.</div>'; return wrap; }

  const modeCard=el('div','card');
  modeCard.innerHTML=`
    <h3>Competitions</h3>
    <div class="pill-select">
      <div class="pill active" id="comp_mode_log">📜 Log a Show</div>
      <div class="pill" id="comp_mode_history">🏆 Show History & Ribbon Wall</div>
    </div>
  `;
  wrap.appendChild(modeCard);

  const contentArea=el('div');
  wrap.appendChild(contentArea);

  function showMode(mode){
    modeCard.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    modeCard.querySelector(`#comp_mode_${mode}`).classList.add('active');
    contentArea.innerHTML='';
    if(mode==='log') contentArea.appendChild(buildShowLogForm());
    else             contentArea.appendChild(buildShowHistory());
  }

  modeCard.querySelector('#comp_mode_log').onclick=()=>showMode('log');
  modeCard.querySelector('#comp_mode_history').onclick=()=>showMode('history');
  showMode('log');
  return wrap;
}

function buildShowLogForm(){
  const wrap=el('div');
  const prizeImages=[];
  let artImage=null;

  const card=el('div','card');
  const discOpts=Object.keys(DISCIPLINES).map(d=>`<option value="${d}">${d}</option>`).join("");
