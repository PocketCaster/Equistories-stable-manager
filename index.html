function renderTackInventory(){
  const wrap=el('div');

  const form=el('div','card',`
    <h3>🏇 Add Tack Item</h3>
    <p class="small" style="margin-top:0;">Add tack to your shared inventory. Then equip pieces on individual horses from their roster card.</p>
    <div class="row">
      <div><label>Item Name</label><input id="tk_name" placeholder="e.g. XC Saddle, Egg-bar Shoes" /></div>
      <div><label>Category</label>
        <select id="tk_cat">
          <option>Saddle</option><option>Bridle</option><option>Shoes</option>
          <option>Boots</option><option>Blanket</option><option>Other</option>
        </select>
      </div>
    </div>
    <div style="margin-top:8px;">
      <label>Item Image</label>
      <input type="file" id="tk_image_file" accept="image/*" />
      <div id="tk_image_preview" style="margin-top:6px;"></div>
    </div>
    <div style="margin-top:8px;">
      <label>Stat Bonuses While Equipped <span class="small">(optional)</span></label>
      <div class="row">
        ${STATS.map(s=>`<div style="min-width:90px;"><label style="font-size:.7em;">${STAT_LABELS[s]}</label><input type="number" id="tk_stat_${s}" value="0" style="padding:4px 6px;" /></div>`).join("")}
      </div>
    </div>
    <button id="tk_add" style="margin-top:10px;">➕ Add to Inventory</button>
  `);
  wrap.appendChild(form);

  let tackImage=null;
  form.querySelector('#tk_image_file').onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{
      tackImage=r.result;
      form.querySelector('#tk_image_preview').innerHTML=`<img src="${tackImage}" style="max-height:100px;border-radius:6px;border:1px solid #4a392a;" />`;
    }; r.readAsDataURL(f);
  };

  form.querySelector('#tk_add').onclick=()=>{
    const name=form.querySelector('#tk_name').value.trim();
    if(!name){ alert("Give the tack item a name first!"); return; }
    const cat=form.querySelector('#tk_cat').value;
    const stats={};
    STATS.forEach(s=>{
      const v=Number(form.querySelector(`#tk_stat_${s}`).value)||0;
      if(v!==0) stats[s]=v;
    });
    const item={ id:uid2(), name, category:cat, image:tackImage, stats };
    if(!state.tackInventory) state.tackInventory=[];
    state.tackInventory.push(item);
    addLog(`🏇 Added "${name}" (${cat}) to the tack inventory.`);
    save(); render();
  };

  // Inventory display
  const inv = state.tackInventory||[];
  const invCard=el('div','card');
  invCard.innerHTML=`<h3>Owned Tack (${inv.length})</h3>`;
  if(!inv.length){
    invCard.innerHTML+=`<div class="small">No tack added yet.</div>`;
  } else {
    const grid=el('div');
    grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:8px;';
    inv.forEach(item=>{
      const statsStr=Object.entries(item.stats||{}).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
      const div=el('div');
      div.style.cssText='background:#15100c;border:1px solid #4a392a;border-radius:8px;padding:8px;text-align:center;';
      div.innerHTML=`
        ${item.image?`<img src="${item.image}" style="width:100%;height:90px;object-fit:cover;border-radius:5px;" />`:`<div style="height:90px;display:flex;align-items:center;justify-content:center;font-size:2em;color:#4a392a;">🏇</div>`}
        <div style="margin-top:6px;font-weight:bold;font-size:.88em;">${item.name}</div>
        <div class="small">${item.category}</div>
        ${statsStr?`<div class="small" style="color:var(--good);margin-top:2px;">${statsStr}</div>`:""}
        <button class="danger" data-act="del-tack" data-id="${item.id}" style="font-size:.7em;padding:3px 8px;margin-top:6px;">Remove</button>
      `;
      grid.appendChild(div);
    });
    invCard.appendChild(grid);
  }
  wrap.appendChild(invCard);

  invCard.querySelectorAll('[data-act="del-tack"]').forEach(b=>b.onclick=()=>{
    if(!confirm('Remove this tack item from inventory? It will be unequipped from any horses wearing it.')) return;
    state.tackInventory=(state.tackInventory||[]).filter(t=>t.id!==b.dataset.id);
    state.horses.forEach(h=>{ h.tackEquipped=(h.tackEquipped||[]).filter(id=>id!==b.dataset.id); });
    save(); render();
  });

  return wrap;
}

const SHOW_EARNING_VALUES = {1:1000, 2:500, 3:250};
const SHOW_EARNING_OTHER = 100;

function calcShowEarnings(h){
  return (h.compHistory||[]).reduce((sum, c)=>{
    if(!c.placement || c.placement === 0) return sum;
    return sum + (SHOW_EARNING_VALUES[c.placement] || SHOW_EARNING_OTHER);
  }, 0);
}

function calcGenoPrice(h){
  const base = h.genoBasePrice || 0;
  const mods = (h.genoModifiers||[]).reduce((s, m)=>s + (m.value||0), 0);
  return base + mods;
}

function calcNetWorth(h){
  if(h.customNetWorth !== null && h.customNetWorth !== undefined && h.customNetWorth !== "") {
    return Number(h.customNetWorth);
  }
  return calcGenoPrice(h) + calcShowEarnings(h);
}

function calcSlotPrice(h){
  return Math.round(calcNetWorth(h) * 0.05);
}

  function field(id, label, val, placeholder, type='input'){
    const inp = type==='textarea'
      ? `<textarea id="${id}" rows="4" placeholder="${placeholder}" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-top:3px;box-sizing:border-box;font-family:Georgia,serif;resize:vertical;">${val||''}</textarea>`
      : `<input id="${id}" value="${val||''}" placeholder="${placeholder}" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-top:3px;box-sizing:border-box;" />`;
    return `<div style="margin-bottom:10px;"><label style="font-size:.78em;color:#b5a392;text-transform:uppercase;display:block;">${label}</label>${inp}</div>`;
  }

  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid #c98a3a;border-radius:10px;padding:24px;max-width:520px;width:100%;color:#f1e6d8;font-family:Georgia,serif;margin:auto;">

    ${field('pm_owner','Owner Name',h.ownerName,'e.g. @YourUsername')}

    ${field('pm_rider','Rider Name (optional)',h.riderName,'e.g. Jane Smith')}
    ${field('pm_stable','Stable / Boarding (optional)',h.stableName,'e.g. Willowbrook Stables')}
    ${field('pm_stablelink','Stable Link (optional)',h.stableLink,'https://…')}
    ${field('pm_personality','Personality',h.personality,'Describe this horse - personality, quirks, and character...','textarea')}
    ${field('pm_history','History',h.horseHistory,'Background story, significant events, journey so far…','textarea')}
    <button id="pm_save" style="width:100%;background:#c98a3a;color:#241a14;border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:.95em;">💾 Save</button>
    <button id="pm_cancel" style="margin-top:8px;width:100%;background:#2c2118;color:#f1e6d8;border:1px solid #4a392a;padding:10px;border-radius:6px;cursor:pointer;font-size:.95em;">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#pm_cancel').onclick=()=>overlay.remove();
  overlay.querySelector('#pm_save').onclick=()=>{
    h.ownerName  = overlay.querySelector('#pm_owner').value.trim();
    h.ownerLink  = overlay.querySelector('#pm_ownerlink').value.trim();
    h.riderName  = overlay.querySelector('#pm_rider').value.trim();
    h.stableName = overlay.querySelector('#pm_stable').value.trim();
    h.stableLink = overlay.querySelector('#pm_stablelink').value.trim();
    h.personality  = overlay.querySelector('#pm_personality').value.trim();
    h.horseHistory = overlay.querySelector('#pm_history').value.trim();
    save(); overlay.remove(); render();
  };
}

  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';

  function inp(style=''){
    return `style="padding:6px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:4px;${style}"`;
  }

  const baseOpts = GENO_BASE_PRICES.map(p=>`<option value="${p.value}" ${h.genoBasePrice===p.value?"selected":""}>${p.label} — ฿${p.value}</option>`).join("");
  const modGroups = Object.entries(GENO_MODIFIERS).map(([group, items])=>`
    <optgroup label="— ${group} —">
      ${items.map(m=>`<option value="${m.value}|${m.label}">${m.label} (+฿${m.value})</option>`).join("")}
    </optgroup>`).join("");

  const existingMods = h.genoModifiers.map((m,i)=>`
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
      <span style="flex:1;font-size:.85em;">${m.label}</span>
      <span style="color:#c98a3a;font-size:.85em;">+฿${m.value}</span>
      <button data-remove="${i}" style="background:#b1473f;color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:.75em;">✕</button>
    </div>`).join("") || `<div class="small" style="opacity:.6;">No modifiers added yet.</div>`;

  const currentNW = calcNetWorth(h);
  const currentSlot = calcSlotPrice(h);

  overlay.innerHTML=`<div style="background:#2c1f16;border:2px solid #c98a3a;border-radius:10px;padding:24px;max-width:540px;width:100%;color:#f1e6d8;font-family:Georgia,serif;margin:auto;">
    <h3 style="margin-top:0;color:#c98a3a;">💰 Net Worth — ${h.name}</h3>
    <p style="color:#b5a392;font-size:.85em;margin-top:0;">Based on the Lightblood Pricing Guide. Breeding slot = Net Worth × 5%.</p>

    <label style="font-size:.78em;color:#b5a392;text-transform:uppercase;display:block;margin-bottom:3px;">Genotype Base Price</label>
    <select id="nw_base" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;margin-bottom:12px;">
      <option value="0">— Select base —</option>
      ${baseOpts}
    </select>

    <label style="font-size:.78em;color:#b5a392;text-transform:uppercase;display:block;margin-bottom:3px;">Add Modifier</label>
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <select id="nw_mod_pick" style="flex:1;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;">
        <option value="">— Pick modifier —</option>
        ${modGroups}
      </select>
      <button id="nw_add_mod" style="background:#c98a3a;color:#241a14;border:none;padding:7px 14px;border-radius:5px;cursor:pointer;font-weight:bold;white-space:nowrap;">+ Add</button>
    </div>

    <div id="nw_mod_list" style="background:#15100c;border:1px solid #4a392a;border-radius:5px;padding:8px;min-height:36px;margin-bottom:12px;">
      ${existingMods}
    </div>

    <label style="font-size:.78em;color:#b5a392;text-transform:uppercase;display:block;margin-bottom:3px;">Custom Net Worth Override <span style="opacity:.6;">(optional — leave blank to use calculated value)</span></label>
    <input id="nw_custom" type="number" value="${h.customNetWorth!==null&&h.customNetWorth!==undefined&&h.customNetWorth!==""?h.customNetWorth:''}" placeholder="e.g. 5000" style="width:100%;padding:7px;background:#15100c;border:1px solid #4a392a;color:#f1e6d8;border-radius:5px;box-sizing:border-box;margin-bottom:12px;" />

    <div id="nw_preview" style="background:#15100c;border:1px solid #4a392a;border-radius:6px;padding:10px;margin-bottom:12px;font-size:.88em;">
      <div style="display:flex;justify-content:space-between;"><span>Genotype Value</span><span>฿${calcGenoPrice(h).toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;"><span>Show Earnings</span><span>฿${calcShowEarnings(h).toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;padding-top:6px;margin-top:6px;border-top:1px solid #2c2118;font-weight:bold;color:#c98a3a;"><span>Net Worth</span><span>฿${currentNW.toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;color:#c98a3a;"><span>Slot Price (5%)</span><span>฿${currentSlot.toLocaleString()}</span></div>
    </div>

    <button id="nw_save" style="width:100%;background:#c98a3a;color:#241a14;border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:.95em;">💾 Save</button>
    <button id="nw_cancel" style="margin-top:8px;width:100%;background:#2c2118;color:#f1e6d8;border:1px solid #4a392a;padding:10px;border-radius:6px;cursor:pointer;font-size:.95em;">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#nw_cancel').onclick=()=>overlay.remove();

  function refreshPreview(){
    const base=Number(overlay.querySelector('#nw_base').value)||0;
    const custom=overlay.querySelector('#nw_custom').value.trim();
    const geno=base+(h.genoModifiers||[]).reduce((s,m)=>s+(m.value||0),0);
    const shows=calcShowEarnings(h);
    const nw=custom!==""?Number(custom):(geno+shows);
    const slot=Math.round(nw*0.05);
    overlay.querySelector('#nw_preview').innerHTML=`
      <div style="display:flex;justify-content:space-between;"><span>Genotype Value</span><span>฿${geno.toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;"><span>Show Earnings</span><span>฿${shows.toLocaleString()}</span></div>
      ${custom!==""?`<div style="display:flex;justify-content:space-between;color:#d4a030;"><span>⚠️ Custom override</span><span>฿${Number(custom).toLocaleString()}</span></div>`:""}
      <div style="display:flex;justify-content:space-between;padding-top:6px;margin-top:6px;border-top:1px solid #2c2118;font-weight:bold;color:#c98a3a;"><span>Net Worth</span><span>฿${nw.toLocaleString()}</span></div>
      <div style="display:flex;justify-content:space-between;color:#c98a3a;"><span>Slot Price (5%)</span><span>฿${slot.toLocaleString()}</span></div>`;
  }

  overlay.querySelector('#nw_base').onchange=refreshPreview;
  overlay.querySelector('#nw_custom').oninput=refreshPreview;

  overlay.querySelector('#nw_add_mod').onclick=()=>{
    const val=overlay.querySelector('#nw_mod_pick').value;
    if(!val) return;
    const [price, ...labelParts]=val.split('|');
    const label=labelParts.join('|');
    h.genoModifiers.push({label, value:Number(price)});
    refreshModList();
    refreshPreview();
    overlay.querySelector('#nw_mod_pick').value='';
  };

  function refreshModList(){
    const list=overlay.querySelector('#nw_mod_list');
    list.innerHTML=h.genoModifiers.length ? h.genoModifiers.map((m,i)=>`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
        <span style="flex:1;font-size:.85em;">${m.label}</span>
        <span style="color:#c98a3a;font-size:.85em;">+฿${m.value}</span>
        <button data-remove="${i}" style="background:#b1473f;color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:.75em;">✕</button>
      </div>`).join("") : `<div class="small" style="opacity:.6;">No modifiers added yet.</div>`;
    list.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{
      h.genoModifiers.splice(Number(b.dataset.remove),1);
      refreshModList(); refreshPreview();
    });
  }
  refreshModList();

  overlay.querySelector('#nw_save').onclick=()=>{
    h.genoBasePrice=Number(overlay.querySelector('#nw_base').value)||0;
    const custom=overlay.querySelector('#nw_custom').value.trim();
    h.customNetWorth=custom!==""?Number(custom):null;
    save(); overlay.remove(); render();
  };
}

// ============================================
// BOOT
// ============================================

load();

})();
</script>
</body>
</html>
